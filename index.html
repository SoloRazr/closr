<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>CLOSR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ===================== CSS Variables ===================== */
    :root {
      --bg: #f8fafc;
      --text: #1e293b;
      --text-muted: #64748b;
      --primary: #4f79f6;
      --primary-soft: rgba(79,121,246,0.1);
      --primary-hover: #3b60d1;
      --card-bg: rgba(255,255,255,0.8);
      --card-border: rgba(255,255,255,0.7);
      --soft-shadow: 0 10px 30px -5px rgba(0,0,0,0.05); /* Soft, diffused shadows instead of hard borders */
      --input-bg: rgba(255,255,255,0.6);
      --danger: #ef4444;
      --radius: 24px;
      --radius-sm: 16px;
      --safe-bottom: max(20px, env(safe-area-inset-bottom));
      --safe-top: max(0px, env(safe-area-inset-top));
    }
    body.dark {
      --bg: #0f172a;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --primary: #60a5fa;
      --primary-soft: rgba(96,165,250,0.12);
      --primary-hover: #3b82f6;
      --card-bg: rgba(30,41,59,0.7);
      --card-border: rgba(255,255,255,0.05);
      --soft-shadow: 0 20px 40px -10px rgba(0,0,0,0.5);
      --input-bg: rgba(15,23,42,0.6);
    }

    /* ===================== Base ===================== */
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Nunito', system-ui, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0; padding: 0; min-height: 100vh;
      transition: background-color 0.3s, color 0.3s;
      -webkit-tap-highlight-color: transparent;
      overflow-x: hidden;
    }
    .container {
      max-width: 520px;
      margin: 0 auto;
      padding: 20px 16px;
      padding-bottom: calc(var(--safe-bottom) + 90px);
      display: none;
    }

    /* ===================== Minimalist Glass ===================== */
    .glass {
      background: var(--card-bg);
      backdrop-filter: blur(16px) saturate(1.8);
      -webkit-backdrop-filter: blur(16px) saturate(1.8);
      border: 1px solid var(--card-border);
      box-shadow: var(--soft-shadow);
      border-radius: var(--radius);
    }

    /* ===================== Icons ===================== */
    .icon { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; display: block; }
    .icon-sm { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; display: block; }
    .icon-filled { fill: currentColor; stroke: none; }

    /* ===================== Nav ===================== */
    .nav-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px;
      padding: calc(var(--safe-top) + 12px) 4px 0;
    }
    .nav-title {
      font-family: 'Sora', sans-serif;
      font-size: 1.7rem; font-weight: 800; margin: 0;
      letter-spacing: -1px;
    }
    .nav-title span { color: var(--primary); }
    .icon-btn {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--text);
      width: 46px; height: 46px; border-radius: 14px;
      display: flex; justify-content: center; align-items: center;
      cursor: pointer; transition: transform 0.2s;
    }
    .icon-btn:active { transform: scale(0.9); }

    /* ===================== Profile ===================== */
    .profile-header {
      padding: 16px; margin-bottom: 24px;
      display: flex; align-items: center; gap: 14px;
      cursor: pointer;
    }
    .profile-avatar {
      width: 56px; height: 56px; border-radius: 18px;
      object-fit: cover; border: 2px solid var(--primary);
    }
    .profile-info { flex: 1; }
    .profile-name { font-family: 'Sora', sans-serif; font-weight: 800; font-size: 1.1rem; }
    .profile-bio { color: var(--text-muted); font-size: 0.85rem; }

    /* ===================== Posts ===================== */
    .post { padding: 18px; margin-bottom: 16px; cursor: pointer; }
    .post-header { margin-bottom: 12px; display: flex; align-items: center; gap: 12px; }
    .author-name { font-family: 'Sora', sans-serif; font-weight: 700; font-size: 0.95rem; }
    .timestamp { color: var(--text-muted); font-size: 0.8rem; }
    .post-content { line-height: 1.6; margin-bottom: 12px; }
    .post-media { width: 100%; border-radius: var(--radius-sm); margin-bottom: 12px; object-fit: cover; }
    .post-stats { display: flex; gap: 18px; color: var(--text-muted); font-weight: 700; font-size: 0.85rem; }
    .c-action { display: flex; align-items: center; gap: 6px; cursor: pointer; }

    /* ===================== Floating Compact Modals ===================== */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.3); z-index: 1000;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      justify-content: center; align-items: center;
      padding: 20px;
    }
    .modal-card {
      width: 100%; max-width: 440px;
      max-height: 85vh;
      animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    @keyframes popIn {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .pm-body { flex: 1; overflow-y: auto; padding: 20px; -webkit-overflow-scrolling: touch; }
    .pm-footer {
      padding: 12px 16px var(--safe-bottom);
      border-top: 1px solid var(--card-border);
      background: var(--card-bg);
      display: flex; gap: 10px; align-items: center;
    }

    /* ===================== Inputs (Anti-Zoom) ===================== */
    input, textarea {
      font-size: 16px !important; /* Prevents iOS auto-zoom on focus */
      font-family: inherit;
    }
    .input-field {
      width: 100%; background: var(--input-bg); color: var(--text);
      border: 1px solid var(--card-border); border-radius: var(--radius-sm);
      padding: 14px; margin-bottom: 12px; outline: none;
    }
    .btn {
      background: var(--primary); color: white; border: none;
      padding: 14px; border-radius: var(--radius-sm); cursor: pointer;
      font-weight: 800; width: 100%; transition: transform 0.2s;
    }
    .btn:active { transform: scale(0.96); }

    /* ===================== FAB ===================== */
    .fab {
      position: fixed; bottom: var(--safe-bottom); right: 20px;
      width: 60px; height: 60px; border-radius: 20px;
      background: var(--primary); color: white;
      display: none; justify-content: center; align-items: center;
      box-shadow: 0 10px 25px rgba(79,121,246,0.3);
      cursor: pointer; z-index: 900;
    }

    /* ===================== Reactions ===================== */
    .reaction-wrap { position: relative; display: inline-flex; }
    .emoji-bar {
      position: absolute; bottom: 100%; left: 0;
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 99px; padding: 6px; display: none; gap: 8px;
      box-shadow: var(--soft-shadow);
    }
    .reaction-wrap:hover .emoji-bar { display: flex; }
  </style>
</head>
<body>

  <!-- Modern SVG Icons -->
  <script>
    const Icons = {
      heart: `<svg class="icon-sm" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`,
      heartFilled: `<svg class="icon-sm icon-filled" style="color:#f44" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`,
      comment: `<svg class="icon-sm" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>`,
      plus: `<svg class="icon" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
      send: `<svg class="icon-sm" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>`,
      x: `<svg class="icon-sm" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`
    };
  </script>

  <!-- Login -->
  <div id="login-screen">
    <div class="modal-overlay" style="display:flex;">
      <div class="modal-card glass" style="padding:40px; text-align:center; max-width:340px;">
        <h1 class="nav-title" style="font-size:2.5rem; margin-bottom:8px;">CLOS<span>R</span></h1>
        <p style="color:var(--text-muted); margin-bottom:32px; font-weight:600;">Family, kept close. 💙</p>
        <button class="btn" id="google-signin-btn">Continue with Google</button>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div class="container" id="app-container">
    <header class="nav-header">
      <h1 class="nav-title">CLOS<span>R</span></h1>
      <button id="theme-toggle" class="icon-btn">
        <svg id="theme-icon" class="icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </header>

    <div class="profile-header glass" onclick="openProfileModal()">
      <img id="main-profile-avatar" class="profile-avatar" src="https://ui-avatars.com/api/?name=User" alt="Profile">
      <div class="profile-info">
        <div class="profile-name" id="main-profile-name">Loading...</div>
        <div class="profile-bio" id="main-profile-bio">Tap to edit profile</div>
      </div>
    </div>

    <div id="feed"></div>
  </div>

  <div id="fab-compose" class="fab" onclick="openComposeModal()"><script>document.write(Icons.plus)</script></div>

  <!-- Unified Modal (Post Details) -->
  <div id="post-detail-modal" class="modal-overlay" onclick="handleOutsideClick(event, 'post-detail-modal')">
    <div class="modal-card glass">
      <div class="pm-body">
        <div style="display:flex; justify-content:flex-end; margin-bottom:12px;">
          <span style="cursor:pointer; color:var(--text-muted);" onclick="closePostModal()"><script>document.write(Icons.x)</script></span>
        </div>
        <div id="pm-content"></div>
        <h4 style="margin: 20px 0 12px; font-size:0.85rem; color:var(--text-muted); letter-spacing:1px;">COMMENTS</h4>
        <div id="pm-comments"></div>
      </div>
      <div class="pm-footer">
        <input type="text" id="comment-input" class="input-field" style="margin-bottom:0; border-radius:99px;" placeholder="Write a comment...">
        <button class="icon-btn" onclick="submitComment()" style="background:var(--primary); color:white; border:none; flex-shrink:0;"><script>document.write(Icons.send)</script></button>
      </div>
    </div>
  </div>

  <!-- Profile Edit -->
  <div id="profile-modal" class="modal-overlay" onclick="handleOutsideClick(event, 'profile-modal')">
    <div class="modal-card glass" style="padding:24px;">
      <h3 style="margin-top:0">Edit Profile</h3>
      <input type="text" id="edit-profile-name" class="input-field" placeholder="Name">
      <input type="text" id="edit-profile-bio" class="input-field" placeholder="Bio">
      <button class="btn" id="save-profile-btn">Save Changes</button>
    </div>
  </div>

  <!-- Compose -->
  <div id="compose-modal" class="modal-overlay" onclick="handleOutsideClick(event, 'compose-modal')">
    <div class="modal-card glass" style="padding:24px;">
      <h3 style="margin-top:0">New Post</h3>
      <textarea id="postInput" class="input-field" rows="4" placeholder="What's going on today?"></textarea>
      <input type="text" id="post-media-url" class="input-field" placeholder="Image URL (optional)">
      <button class="btn" id="share-btn">Share with Family</button>
    </div>
  </div>

  <!-- Firebase Logic -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, updateDoc, arrayUnion, arrayRemove, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDusGOyWlAEpBUZ-Bm89vZ9SAqAMrWJt3E",
      authDomain: "anda-sol.firebaseapp.com",
      projectId: "anda-sol",
      storageBucket: "anda-sol.firebasestorage.app",
      messagingSenderId: "341991663482",
      appId: "1:341991663482:web:fe92b24241c2fe7a9b98c3"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const ADMIN_EMAIL = "amorsolo.villanda@gmail.com";

    let currentUser = null;
    let userProfile = { name: '', bio: '', avatarUrl: '' };

    // --- Modal Logic ---
    window.handleOutsideClick = (e, id) => { if (e.target.id === id) document.getElementById(id).style.display = 'none'; };
    window.openComposeModal = () => document.getElementById('compose-modal').style.display = 'flex';
    window.openProfileModal = () => document.getElementById('profile-modal').style.display = 'flex';
    window.closePostModal = () => document.getElementById('post-detail-modal').style.display = 'none';

    // --- Auth ---
    document.getElementById('google-signin-btn').onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
    
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-container').style.display = 'block';
        document.getElementById('fab-compose').style.display = (user.email === ADMIN_EMAIL) ? 'flex' : 'none';
        
        const docSnap = await getDoc(doc(db, "users", user.uid));
        userProfile = docSnap.exists() ? docSnap.data() : { name: user.displayName, bio: 'Hello family!', avatarUrl: user.photoURL };
        updateProfileUI();
        loadPosts();
      } else {
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('app-container').style.display = 'none';
      }
    });

    function updateProfileUI() {
      document.getElementById('main-profile-name').innerText = userProfile.name;
      document.getElementById('main-profile-bio').innerText = userProfile.bio;
      document.getElementById('main-profile-avatar').src = userProfile.avatarUrl;
    }

    // --- Theme ---
    const toggleTheme = () => {
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      document.getElementById('theme-icon').innerHTML = isDark 
        ? `<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>`
        : `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`;
    };
    document.getElementById('theme-toggle').onclick = toggleTheme;

    // --- Core Feed Functionality ---
    function loadPosts() {
      const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
      onSnapshot(q, (snap) => {
        const feed = document.getElementById('feed');
        feed.innerHTML = '';
        snap.forEach(docSnap => {
          const data = docSnap.id; // Map this to your specific UI rendering logic
          // (Insert rendering logic here similar to your previous build)
        });
      });
    }

    // (Add remaining submitPost, submitComment, reactToPost functions here)
  </script>
</body>
</html>
