<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CLOSR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ===================== CSS Variables ===================== */
    :root {
      --bg: #eef2f7;
      --text: #1a2236;
      --text-muted: #7a8499;
      --primary: #4f79f6;
      --primary-soft: rgba(79,121,246,0.13);
      --primary-hover: #3562e8;
      --card-bg: rgba(255,255,255,0.72);
      --card-border: rgba(255,255,255,0.85);
      --glass-shadow: 0 12px 40px rgba(30,50,120,0.1);
      --input-bg: rgba(255,255,255,0.55);
      --blob-1: rgba(79,121,246,0.14);
      --blob-2: rgba(180,120,255,0.12);
      --blob-3: rgba(80,220,180,0.09);
      --danger: #f44;
      --radius: 24px;
      --radius-sm: 16px;
      --safe-bottom: max(20px, env(safe-area-inset-bottom));
      --safe-top: max(0px, env(safe-area-inset-top));
    }
    body.dark {
      --bg: #0f1520;
      --text: #edf2ff;
      --text-muted: #7b8baa;
      --primary: #6390ff;
      --primary-soft: rgba(99,144,255,0.15);
      --primary-hover: #4f79f6;
      --card-bg: rgba(22,33,60,0.72);
      --card-border: rgba(255,255,255,0.07);
      --glass-shadow: 0 15px 45px rgba(0,0,0,0.45);
      --input-bg: rgba(10,15,30,0.55);
      --blob-1: rgba(79,121,246,0.09);
      --blob-2: rgba(170,100,255,0.08);
      --blob-3: rgba(60,200,160,0.06);
    }

    /* ===================== Base ===================== */
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Nunito', system-ui, sans-serif;
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse at 10% 10%, var(--blob-1) 0px, transparent 55%),
        radial-gradient(ellipse at 90% 90%, var(--blob-2) 0px, transparent 55%),
        radial-gradient(ellipse at 50% 50%, var(--blob-3) 0px, transparent 60%);
      background-attachment: fixed;
      color: var(--text);
      margin: 0; padding: 0; min-height: 100vh;
      transition: background-color 0.3s, color 0.3s;
      -webkit-tap-highlight-color: transparent;
    }
    .container {
      max-width: 560px;
      margin: 0 auto;
      padding: 20px 16px;
      padding-bottom: calc(var(--safe-bottom) + 86px);
      display: none;
    }

    /* ===================== Glass ===================== */
    .glass {
      background: var(--card-bg);
      backdrop-filter: blur(18px) saturate(1.4);
      -webkit-backdrop-filter: blur(18px) saturate(1.4);
      border: 1.5px solid var(--card-border);
      box-shadow: var(--glass-shadow);
      border-radius: var(--radius);
    }

    /* ===================== Nav ===================== */
    .nav-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 22px;
      padding: calc(var(--safe-top) + 8px) 2px 0;
    }
    .nav-title {
      font-family: 'Sora', sans-serif;
      font-size: 1.65rem; font-weight: 800; margin: 0;
      display: flex; align-items: center; gap: 10px;
      letter-spacing: -0.5px;
    }
    .nav-title span.logo-dot { color: var(--primary); }
    .icon-btn {
      background: var(--card-bg);
      border: 1.5px solid var(--card-border);
      color: var(--text);
      width: 44px; height: 44px; border-radius: 50%;
      display: flex; justify-content: center; align-items: center;
      cursor: pointer;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      transition: transform 0.18s, box-shadow 0.18s;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }
    .icon-btn:active { transform: scale(0.88); }

    /* ===================== Modals: The "Floating" Fix ===================== */
    .post-modal-overlay, .small-modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.55); z-index: 1000;
      justify-content: center; align-items: center; /* Center horizontally & vertically */
      padding: 20px;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }

    .post-modal-card, .modal-card {
      width: 92%; max-width: 500px;
      max-height: 85vh; /* Prevent overflowing screen height */
      background: var(--bg);
      border-radius: var(--radius);
      border: 1.5px solid var(--card-border);
      box-shadow: var(--glass-shadow);
      display: flex; flex-direction: column;
      overflow: hidden;
      animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .modal-card { max-width: 420px; padding: 24px; }

    @keyframes popIn {
      from { transform: scale(0.92) translateY(15px); opacity: 0; }
      to { transform: scale(1) translateY(0); opacity: 1; }
    }

    /* ===================== Inputs: The "No Zoom" Fix ===================== */
    .input-field, textarea, .comment-input {
      width: 100%; background: var(--input-bg); color: var(--text);
      border: 1.5px solid var(--card-border); border-radius: var(--radius-sm);
      padding: 13px 16px; font-size: 16px; /* Prevents iOS auto-zoom */
      margin-bottom: 14px; outline: none;
      font-family: 'Nunito', sans-serif;
      transition: border-color 0.2s;
    }
    .input-field:focus, .comment-input:focus { border-color: var(--primary); }

    /* ===================== Components ===================== */
    .btn {
      background: linear-gradient(135deg, var(--primary), #7b5fe8);
      color: white; border: none; padding: 13px 26px;
      border-radius: 9999px; cursor: pointer;
      font-weight: 800; font-size: 15px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 4px 16px rgba(79,121,246,0.3);
    }
    .btn-outline {
      background: var(--input-bg); color: var(--text);
      border: 1.5px solid var(--card-border);
      padding: 11px 18px; border-radius: 9999px;
      font-weight: 700; font-size: 14px;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      flex: 1;
    }

    .post { padding: 20px; margin-bottom: 16px; cursor: pointer; }
    .post-media { width: 100%; border-radius: var(--radius-sm); margin-bottom: 14px; }
    
    .pm-header {
      padding: 18px 20px; border-bottom: 1.5px solid var(--card-border);
      display: flex; justify-content: space-between; align-items: center;
      background: var(--card-bg); font-family: 'Sora', sans-serif;
    }
    .pm-body { flex: 1; overflow-y: auto; padding: 20px; }
    .pm-footer {
      padding: 14px 16px; border-top: 1.5px solid var(--card-border);
      background: var(--card-bg); display: flex; gap: 10px; align-items: center;
    }

    .fab {
      position: fixed; bottom: var(--safe-bottom); right: 20px;
      width: 62px; height: 62px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), #7b5fe8);
      color: white; display: none; justify-content: center; align-items: center;
      box-shadow: 0 8px 28px rgba(79,121,246,0.45); z-index: 900;
    }

    /* Helper styles for reaction bar */
    .reaction-wrap { position: relative; display: inline-flex; }
    .emoji-bar {
      position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%) scale(0.85);
      background: var(--card-bg); border: 1.5px solid var(--card-border);
      border-radius: 999px; padding: 6px 10px; display: flex; gap: 4px; opacity: 0; pointer-events: none;
      transition: all 0.18s; z-index: 50;
    }
    .reaction-wrap.show-emojis .emoji-bar { opacity: 1; pointer-events: auto; transform: translateX(-50%) scale(1); }
    
    /* Profile styles */
    .profile-header { padding: 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 16px; }
    .profile-avatar { width: 62px; height: 62px; border-radius: 50%; border: 2.5px solid var(--primary); }

    /* Icons */
    .icon { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2; }
    .icon-sm { width: 17px; height: 17px; fill: none; stroke: currentColor; stroke-width: 2; }
  </style>
</head>
<body>

  <script>
    const Icons = {
      heart: `<svg class="icon-sm" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>`,
      heartFilled: `<svg class="icon-sm" style="fill:#f44; stroke:none;" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>`,
      comment: `<svg class="icon-sm" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>`,
      edit: `<svg class="icon-sm" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>`,
      trash: `<svg class="icon-sm" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>`
    };
  </script>

  <!-- Login, App Container, and Modals remain structurally the same, but CSS handles the centering -->
  <div id="login-screen" style="position:fixed; inset:0; background:var(--bg); display:flex; justify-content:center; align-items:center; z-index:100; padding:24px;">
    <div class="login-card glass" style="max-width:340px; text-align:center; padding:40px 30px;">
      <h1 style="font-family:'Sora'; font-size:2.6rem;">CLOS<span style="color:var(--primary);">R</span></h1>
      <p style="color:var(--text-muted); margin-bottom:30px;">Family, kept close. 💙</p>
      <button class="btn" id="google-signin-btn" style="width:100%;">Continue with Google</button>
    </div>
  </div>

  <div class="container" id="app-container">
    <div class="nav-header">
      <h1 class="nav-title">CLOS<span class="logo-dot">R</span> <span id="user-badge" style="font-size:13px; font-weight:600; color:var(--text-muted);"></span></h1>
      <button id="theme-toggle" class="icon-btn"><svg id="theme-icon" class="icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg></button>
    </div>

    <div class="profile-header glass" onclick="openProfileModal()">
      <img id="main-profile-avatar" class="profile-avatar" src="" alt="Profile">
      <div class="profile-info">
        <div class="profile-name" id="main-profile-name" style="font-weight:800;">Loading…</div>
        <div class="profile-bio" id="main-profile-bio" style="font-size:0.88rem; color:var(--text-muted);">Welcome to the family!</div>
      </div>
    </div>
    <div id="feed"></div>
  </div>

  <div id="fab-compose" class="fab" onclick="openComposeModal()">
    <svg class="icon" viewBox="0 0 24 24" style="stroke-width:3;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
  </div>

  <!-- MODALS -->
  <div id="compose-modal" class="small-modal" onclick="handleSmallModalClick(event)">
    <div class="modal-card glass">
      <h3 style="margin-top:0;">✏️ New Post</h3>
      <textarea id="postInput" rows="3" placeholder="What's going on today?"></textarea>
      <button class="btn" id="share-btn" style="width:100%;">Share</button>
    </div>
  </div>

  <div id="post-detail-modal" class="post-modal-overlay" onclick="handleModalOverlayClick(event)">
    <div class="post-modal-card">
      <div class="pm-header">
        <span>Post Details</span>
        <span onclick="closePostModal()" style="cursor:pointer; color:var(--text-muted);">✕</span>
      </div>
      <div class="pm-body">
        <div id="pm-content"></div>
        <div id="pm-comments"></div>
      </div>
      <div class="pm-footer">
        <input type="text" id="comment-input" class="comment-input" placeholder="Write a comment…" style="margin-bottom:0;">
        <button class="btn" onclick="submitComment()" style="padding:10px 15px;">Send</button>
      </div>
    </div>
  </div>

  <div id="profile-modal" class="small-modal" onclick="handleSmallModalClick(event)">
    <div class="modal-card glass">
      <h3>👤 Edit Profile</h3>
      <input type="text" id="edit-profile-name" class="input-field" placeholder="Name">
      <input type="text" id="edit-profile-bio" class="input-field" placeholder="Bio">
      <button class="btn" id="save-profile-btn" style="width:100%;">Save</button>
    </div>
  </div>

  <!-- Firebase & Logic (Consolidated) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, updateDoc, setDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDusGOyWlAEpBUZ-Bm89vZ9SAqAMrWJt3E",
      authDomain: "anda-sol.firebaseapp.com",
      projectId: "anda-sol",
      storageBucket: "anda-sol.firebasestorage.app",
      messagingSenderId: "341991663482",
      appId: "1:341991663482:web:fe92b24241c2fe7a9b98c3"
    };

    const ADMIN_EMAIL = "amorsolo.villanda@gmail.com";
    // Members who can post (in addition to admin)
    const MEMBER_EMAILS = []; // Add family/friend emails here e.g. ["sister@gmail.com"]

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let currentUserRole = 'guest'; // 'admin' | 'member' | 'guest'
    let userProfile = { name: '', bio: '', avatarUrl: '' };
    let allPostsData = {};
    let activePostId = null;
    let commentsUnsubscribe = null;
    let selectedDuration = 1; // days
    let activeMediaTab = 'photo';

    const defaultAvatar = "https://ui-avatars.com/api/?background=4f79f6&color=fff&name=";

    // --- UI Controls ---
    window.openComposeModal = () => document.getElementById('compose-modal').style.display = 'flex';
    window.openProfileModal = () => document.getElementById('profile-modal').style.display = 'flex';
    window.closePostModal = () => document.getElementById('post-detail-modal').style.display = 'none';
    window.handleSmallModalClick = (e) => { if(e.target.classList.contains('small-modal')) e.target.style.display = 'none'; };
    window.handleModalOverlayClick = (e) => { if(e.target.classList.contains('post-modal-overlay')) closePostModal(); };

    // --- Post Logic ---
    async function loadPosts() {
      const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
      onSnapshot(q, (snap) => {
        const feed = document.getElementById('feed');
        feed.innerHTML = '';
        snap.forEach(doc => {
          const data = doc.data();
          const postEl = document.createElement('div');
          postEl.className = 'post glass';
          postEl.innerHTML = `<strong>${data.authorName}</strong><p>${data.text}</p>`;
          postEl.onclick = () => openPostDetail(doc.id, data);
          feed.appendChild(postEl);
        });
      });
    }

    window.openPostDetail = (id, data) => {
      activePostId = id;
      document.getElementById('pm-content').innerHTML = `<h3>${data.authorName}</h3><p>${data.text}</p>`;
      document.getElementById('post-detail-modal').style.display = 'flex';
    };

    document.getElementById('share-btn').addEventListener('click', async () => {
      const text = document.getElementById('postInput').value;
      if (!text) return;
      await addDoc(collection(db, "posts"), {
        text, authorName: currentUser.displayName, authorUid: currentUser.uid, createdAt: serverTimestamp()
      });
      document.getElementById('postInput').value = '';
      document.getElementById('compose-modal').style.display = 'none';
    });

    // --- Theme Toggle ---
    document.getElementById('theme-toggle').addEventListener('click', () => {
      document.body.classList.toggle('dark');
    });
  </script>
</body>
</html>
