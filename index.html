<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>CLOSR</title>
  <style>
    :root {
      --bg: #f8f9fa;
      --text: #1c1c1e;
      --text-muted: #8e8e93;
      --primary: #007aff;
      --card-bg: rgba(255, 255, 255, 0.8);
      --input-bg: rgba(239, 239, 240, 0.7);
      /* Minimalist soft shadows instead of hard borders */
      --glass-shadow: 0 12px 40px rgba(0, 0, 0, 0.06); 
      --blob-1: rgba(0, 122, 255, 0.08);
      --blob-2: rgba(175, 82, 222, 0.08);
    }

    body.dark {
      --bg: #000000;
      --text: #ffffff;
      --text-muted: #a1a1a6;
      --primary: #0a84ff;
      --card-bg: rgba(28, 28, 30, 0.8);
      --input-bg: rgba(44, 44, 46, 0.7);
      --glass-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
    }

    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      background-color: var(--bg); 
      background-image: radial-gradient(at 0% 0%, var(--blob-1) 0px, transparent 50%), radial-gradient(at 100% 100%, var(--blob-2) 0px, transparent 50%);
      background-attachment: fixed;
      color: var(--text); 
      margin: 0; padding: 0; min-height: 100vh;
      transition: background-color 0.3s;
      -webkit-tap-highlight-color: transparent;
    }
    
    .container { max-width: 600px; margin: 0 auto; padding: 20px; padding-top: calc(20px + env(safe-area-inset-top)); padding-bottom: calc(90px + env(safe-area-inset-bottom)); display: none; }
    
    .glass {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: var(--glass-shadow);
      border-radius: 20px;
      border: none; /* Minimalist: removed hard borders */
    }

    .icon-sm { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; }
    
    /* Top Navigation */
    .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .nav-title { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
    .icon-btn { background: var(--input-bg); border: none; color: var(--text); width: 36px; height: 36px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; }

    /* Post Card */
    .post { padding: 16px; margin-bottom: 16px; transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    .post:active { transform: scale(0.97); }
    .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .author-name { font-weight: 600; font-size: 15px; }
    .timestamp { color: var(--text-muted); font-size: 13px; }
    .post-content { font-size: 16px; line-height: 1.4; margin-bottom: 12px; }
    .post-media { width: 100%; border-radius: 12px; overflow: hidden; margin-bottom: 12px; }

    /* Unified Media Input */
    .media-preview-bar { display: flex; gap: 8px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 4px; }
    .media-pill { background: var(--primary); color: white; padding: 6px 12px; border-radius: 20px; font-size: 12px; display: flex; align-items: center; gap: 6px; }

    /* Comment Actions */
    .comment-box { position: relative; padding: 12px; margin-bottom: 8px; }
    .comment-meta { display: flex; justify-content: space-between; align-items: flex-start; }
    .comment-delete-btn { color: #ff3b30; padding: 4px; opacity: 0.6; cursor: pointer; }

    /* FAB */
    .fab { position: fixed; bottom: calc(30px + env(safe-area-inset-bottom)); right: 20px; width: 56px; height: 56px; border-radius: 28px; background: var(--primary); color: white; display: none; justify-content: center; align-items: center; box-shadow: 0 8px 24px rgba(0, 122, 255, 0.3); z-index: 900; }

    .btn { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 12px; font-weight: 600; cursor: pointer; }
    .input-field { width: 100%; background: var(--input-bg); border: none; border-radius: 12px; padding: 14px; color: var(--text); font-size: 16px; box-sizing: border-box; }
  </style>
</head>
<body>

  <!-- App Structure Remains largely same, simplified for brevity -->
  <div id="login-screen">...</div>
  
  <div class="container" id="app-container">
    <div class="nav-header">
      <h1 class="nav-title">CLOSR <span id="user-badge" style="font-size: 12px; opacity: 0.5;"></span></h1>
      <button id="theme-toggle" class="icon-btn">🌓</button>
    </div>
    <div class="profile-header glass" onclick="openProfileModal()">...</div>
    <div id="feed"></div>
  </div>

  <div id="fab-compose" class="fab" onclick="openComposeModal()">+</div>

  <!-- Unified Compose Modal -->
  <div id="compose-modal" class="small-modal">
    <div class="modal-card glass">
      <textarea id="postInput" placeholder="Share a moment..." rows="3" style="width: 100%; background: transparent; border: none; color: var(--text); font-size: 18px; outline: none;"></textarea>
      <div id="media-input-container" style="display:none; margin-top: 10px;">
        <input type="text" id="unified-media-url" class="input-field" placeholder="Paste Image or YouTube link...">
      </div>
      <div style="display: flex; gap: 10px; margin-top: 15px;">
        <button class="icon-btn" onclick="toggleMediaInput()" title="Add Media">📷</button>
        <button class="btn" id="share-btn" style="flex: 1;">Post</button>
      </div>
    </div>
  </div>

  <!-- Post Detail Modal -->
  <div id="post-detail-modal" class="post-modal-overlay">
    <div class="post-modal-card">
      <div class="pm-header">
        <span>Thread</span>
        <span class="pm-close" onclick="closePostModal()">✕</span>
      </div>
      <div class="pm-body">
        <div id="pm-content"></div>
        <div id="pm-comments"></div>
      </div>
      <div class="pm-footer">
        <input type="text" id="comment-input" class="comment-input" placeholder="Write a comment...">
        <button class="comment-send" onclick="submitComment()">↑</button>
      </div>
    </div>
  </div>

  <script type="module">
    // ... Firebase Imports & Init ... (Using your existing config)

    // --- LOGIC FOR COMMENT COUNTS & MEDIA DETECTION ---

    window.toggleMediaInput = () => {
      const el = document.getElementById('media-input-container');
      el.style.display = el.style.display === 'none' ? 'block' : 'none';
    };

    async function getCommentCount(postId) {
      const q = query(collection(db, "posts", postId, "comments"));
      const snap = await getDocs(q); // For a live app, use a counter field in Firestore for performance
      return snap.size;
    }

    window.deleteComment = async (postId, commentId) => {
      if (!confirm("Delete this comment?")) return;
      try {
        await deleteDoc(doc(db, "posts", postId, "comments", commentId));
      } catch (e) { alert("Error deleting comment"); }
    };

    // Modified LoadPosts to include Comment Count
    function loadPosts() {
      const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
      onSnapshot(q, async (snapshot) => {
        const feed = document.getElementById('feed');
        feed.innerHTML = '';
        
        for (const docSnap of snapshot.docs) {
          const data = docSnap.id;
          const post = docSnap.data();
          
          // Get comment count dynamically
          const commentSnap = await getDocs(collection(db, "posts", docSnap.id, "comments"));
          const count = commentSnap.size;

          const postHTML = `
            <div class="post glass" onclick="window.openPostModal('${docSnap.id}')">
              <div class="post-header">
                <img src="${post.authorAvatar}" class="avatar-sm">
                <div class="post-author-info">
                  <span class="author-name">${post.authorName}</span>
                </div>
              </div>
              <div class="post-content">${post.text || ''}</div>
              <div class="post-stats">
                <span>❤️ ${post.likedBy?.length || 0}</span>
                <span>💬 ${count} comments</span>
              </div>
            </div>
          `;
          feed.insertAdjacentHTML('beforeend', postHTML);
        }
      });
    }

    // Modified Comment Rendering with Delete Logic
    window.renderComments = (postId) => {
      const q = query(collection(db, "posts", postId, "comments"), orderBy("createdAt", "asc"));
      onSnapshot(q, (snapshot) => {
        const div = document.getElementById('pm-comments');
        div.innerHTML = '';
        snapshot.forEach(cDoc => {
          const c = cDoc.data();
          const canDelete = currentUser.uid === c.authorId || currentUserRole === 'admin';
          
          div.insertAdjacentHTML('beforeend', `
            <div class="comment-box glass">
              <div class="comment-meta">
                <span class="author-name">${c.authorName}</span>
                ${canDelete ? `<span class="comment-delete-btn" onclick="event.stopPropagation(); deleteComment('${postId}', '${cDoc.id}')">🗑️</span>` : ''}
              </div>
              <div class="comment-text">${c.text}</div>
            </div>
          `);
        });
      });
    };
    
    // --- Unified Media Logic for Share Button ---
    // When sharing, detect if unified-media-url is YT or Image automatically.
  </script>
</body>
</html>
