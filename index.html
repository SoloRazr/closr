<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>CLOSR</title>
  <style>
    /* Global Styles & Theming[cite: 1] */
    :root {
      --bg: #f8fafc;
      --text: #0f172a;
      --text-muted: #64748b;
      --primary: #3b82f6;
      --card-bg: rgba(255, 255, 255, 0.85);
      --card-border: rgba(255, 255, 255, 0.6);
      --glass-shadow: 0 12px 40px -12px rgba(0, 0, 0, 0.08);
      --input-bg: rgba(255, 255, 255, 0.6);
      --radius: 24px;
    }

    body.dark {
      --bg: #020617;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --primary: #60a5fa;
      --card-bg: rgba(15, 23, 42, 0.75);
      --card-border: rgba(255, 255, 255, 0.06);
      --glass-shadow: 0 20px 60px -15px rgba(0, 0, 0, 0.6);
    }

    body { 
      font-family: system-ui, -apple-system, sans-serif; 
      background-color: var(--bg); 
      background-image: radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.08) 0px, transparent 40%), radial-gradient(at 100% 100%, rgba(167, 139, 250, 0.08) 0px, transparent 40%);
      background-attachment: fixed;
      color: var(--text); 
      margin: 0; padding: 0; min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }
    
    .container { max-width: 600px; margin: 0 auto; padding: 20px 20px calc(100px + env(safe-area-inset-bottom)); display: none; }
    
    .glass {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      box-shadow: var(--glass-shadow);
      border-radius: var(--radius);
    }

    .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
    .nav-title { font-size: 1.8rem; font-weight: 900; letter-spacing: -0.04em; }

    .post { padding: 24px; margin-bottom: 28px; border: none; }
    .post-header { margin-bottom: 18px; display: flex; align-items: center; gap: 14px; }
    .profile-avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); padding: 2px; background: var(--bg); }
    .post-content { line-height: 1.7; margin-bottom: 20px; font-size: 1.1rem; white-space: pre-wrap; }
    .post-media { width: 100%; border-radius: 20px; margin-bottom: 20px; box-shadow: var(--glass-shadow); }

    /* Hover Reactions[cite: 1] */
    .post-actions { display: flex; gap: 24px; border-top: 1px solid var(--card-border); padding-top: 20px; margin-top: 12px; position: relative; }
    .action-item { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.95em; font-weight: 700; color: var(--text-muted); position: relative; }
    
    .reaction-popover { 
      position: absolute; bottom: 100%; left: 0; 
      display: none; gap: 12px; padding: 10px 18px; 
      background: var(--card-bg); backdrop-filter: blur(15px);
      border-radius: 99px; margin-bottom: 12px; 
      box-shadow: var(--glass-shadow); border: 1px solid var(--card-border);
      z-index: 100;
    }
    .action-item:hover .reaction-popover { display: flex; }
    .react-emoji { font-size: 1.5rem; transition: transform 0.2s; }
    .react-emoji:hover { transform: scale(1.4); }

    .mini-pill { background: var(--input-bg); padding: 6px 12px; border-radius: 99px; font-size: 0.85em; border: 1px solid var(--card-border); display: flex; align-items: center; gap: 6px; font-weight: 600; margin-bottom: 10px;}

    /* Comment Styling & Actions[cite: 1] */
    .comment-card { margin-bottom: 16px; display: flex; gap: 12px; align-items: flex-start; }
    .comment-bubble { padding: 14px 18px; border-radius: 22px; font-size: 1em; flex: 1; position: relative; }
    .comment-tools { display: flex; gap: 12px; margin-top: 6px; font-size: 0.75em; font-weight: 800; color: var(--text-muted); padding-left: 10px; }
    .tool-link { cursor: pointer; }
    .tool-link:hover { color: var(--primary); }

    .fab { position: fixed; bottom: max(32px, env(safe-area-inset-bottom)); right: 24px; width: 68px; height: 68px; border-radius: 50%; background: var(--primary); color: white; display: none; justify-content: center; align-items: center; box-shadow: 0 16px 32px rgba(59, 130, 246, 0.4); cursor: pointer; z-index: 900; }

    .small-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(12px); }
    .post-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: flex-end; backdrop-filter: blur(12px); }
    .post-modal-card { width: 100%; max-height: 94vh; display: flex; flex-direction: column; background: var(--bg); border-radius: 36px 36px 0 0; overflow: hidden; }
    
    @media (min-width: 600px) { .post-modal-card { max-width: 520px; border-radius: 36px; height: 85vh; } }

    .btn { background: var(--primary); color: white; border: none; padding: 16px 32px; border-radius: 999px; cursor: pointer; font-weight: 800; }
    .input-field { width: 100%; background: var(--input-bg); color: var(--text); border: 1px solid var(--card-border); border-radius: 18px; padding: 16px; font-size: 16px; margin-bottom: 16px; box-sizing: border-box; outline: none; }
    
    #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 3000; }
  </style>
</head>
<body>

  <script>
    const Icons = {
      comment: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>`,
      plus: `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>`,
      heart: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>`,
      send: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>`
    };
    const Emojis = ['❤️', '😂', '🙌', '😮', '🙏'];
  </script>

  <div id="login-screen">
    <div class="glass" style="padding: 48px; text-align: center; max-width: 340px; width: 90%;">
      <h2 style="margin-top: 0; font-weight: 900; font-size: 2.5rem;">CLOSR</h2>
      <button class="btn" id="google-signin-btn" style="width: 100%;">Enter Space</button>
    </div>
  </div>

  <div class="container" id="app-container">
    <div class="nav-header">
      <h1 class="nav-title">CLOSR</h1>
      <button id="theme-toggle" class="glass" style="width: 44px; height: 44px; border-radius: 50%; border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; color:inherit;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
      </button>
    </div>
    
    <div class="profile-header glass" onclick="openProfileModal()">
      <img id="main-profile-avatar" class="profile-avatar" src="">
      <div class="profile-info">
        <div class="profile-name" id="main-profile-name">...</div>
        <div class="profile-bio" id="main-profile-bio" style="color:var(--text-muted); font-size:0.9em;">Family</div>
      </div>
    </div>

    <div id="feed"></div>
  </div>

  <div id="fab-compose" class="fab"></div>

  <!-- MODALS -->
  <div id="compose-modal" class="small-modal">
    <div class="glass" style="width: 100%; max-width: 480px; padding: 32px;">
      <h3 style="margin-top:0; font-weight: 900;">New Spark</h3>
      <textarea id="postInput" rows="4" placeholder="Share a moment..." style="width: 100%; background: transparent; border: none; outline: none; color: var(--text); font-size: 1.2rem; resize: none;"></textarea>
      <div id="image-url-container" style="display: none;"><input type="text" id="post-image-url" class="input-field" placeholder="Image URL"></div>
      <div style="display: flex; gap: 12px; margin-top: 20px;">
        <button class="btn" style="background: var(--input-bg); color: var(--text); flex: 1;" onclick="toggleInput('image')">Media</button>
        <button class="btn" id="share-btn" style="flex: 1.5;">Share</button>
      </div>
    </div>
  </div>

  <div id="post-detail-modal" class="post-modal-overlay">
    <div class="post-modal-card glass">
      <div style="padding: 24px; border-bottom: 1px solid var(--card-border); display: flex; justify-content: space-between; align-items: center; background: var(--card-bg);">
        <span style="font-weight: 900;">Conversation</span>
        <span onclick="closePostModal()" style="cursor: pointer; font-weight: 800; opacity: 0.5;">Close</span>
      </div>
      <div style="flex: 1; overflow-y: auto; padding: 24px;">
        <div id="pm-content"></div>
        <div id="pm-comments" style="margin-top: 24px;"></div>
      </div>
      <div style="padding: 20px; border-top: 1px solid var(--card-border); display: flex; gap: 14px; align-items: center; background: var(--card-bg); padding-bottom: max(20px, env(safe-area-inset-bottom));">
        <input type="text" id="comment-input" class="input-field" style="margin-bottom:0; border-radius: 99px;" placeholder="Add to talk...">
        <button class="btn" onclick="submitComment()" style="width: 52px; height: 52px; padding:0; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
          <script>document.write(Icons.send)</script>
        </button>
      </div>
    </div>
  </div>

  <div id="edit-comment-modal" class="small-modal">
    <div class="glass" style="width: 100%; max-width: 440px; padding: 32px;">
      <h3 style="margin-top:0; font-weight: 900;">Edit Comment</h3>
      <textarea id="edit-comment-textarea" rows="3" class="input-field"></textarea>
      <button class="btn" id="save-comment-btn" style="width: 100%;">Update</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, updateDoc, setDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDusGOyWlAEpBUZ-Bm89vZ9SAqAMrWJt3E",
      authDomain: "anda-sol.firebaseapp.com",
      projectId: "anda-sol",
      storageBucket: "anda-sol.firebasestorage.app",
      messagingSenderId: "341991663482",
      appId: "1:341991663482:web:fe92b24241c2fe7a9b98c3"
    };

    const ADMIN_EMAIL = "amorsolo.villanda@gmail.com"; 
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let userProfile = {};
    let allPostsData = {};
    let activePostId = null;
    let editingCommentId = null;

    document.getElementById('fab-compose').innerHTML = Icons.plus;

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-container').style.display = 'block';
        document.getElementById('fab-compose').style.display = 'flex';
        const userRef = doc(db, "users", user.uid);
        const docSnap = await getDoc(userRef);
        userProfile = docSnap.exists() ? docSnap.data() : { name: user.displayName, avatarUrl: user.photoURL };
        if(!docSnap.exists()) await setDoc(userRef, userProfile);
        updateProfileUI();
        loadPosts();
      }
    });

    function updateProfileUI() {
      document.getElementById('main-profile-name').innerText = userProfile.name;
      document.getElementById('main-profile-avatar').src = userProfile.avatarUrl;
    }

    window.loadPosts = () => {
      onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc")), (snapshot) => {
        const feed = document.getElementById('feed');
        feed.innerHTML = '';
        snapshot.forEach((docSnap) => {
          const data = { ...docSnap.data(), id: docSnap.id };
          allPostsData[data.id] = data;
          
          let reactionHTML = '<div style="display:flex; gap:8px; flex-wrap:wrap;">';
          const counts = {};
          Object.values(data.reactions || {}).forEach(e => counts[e] = (counts[e] || 0) + 1);
          Object.entries(counts).forEach(([e, c]) => reactionHTML += `<div class="mini-pill">${e} ${c}</div>`);
          reactionHTML += '</div>';

          let popoverHTML = `<div class="reaction-popover glass">`;
          Emojis.forEach(e => popoverHTML += `<span class="react-emoji" onclick="event.stopPropagation(); window.toggleEmoji('${data.id}', '${e}')">${e}</span>`);
          popoverHTML += `</div>`;

          feed.insertAdjacentHTML('beforeend', `
            <div class="post glass" onclick="window.openPostModal('${data.id}')">
              <div class="post-header">
                <img src="${data.authorAvatar}" class="profile-avatar">
                <div><div class="author-name">${data.authorName}</div><div class="timestamp">${data.createdAt?.toDate().toLocaleDateString() || 'now'}</div></div>
              </div>
              <div class="post-content">${data.text || ''}</div>
              ${data.mediaUrl ? `<img src="${data.mediaUrl}" class="post-media">` : ''}
              ${reactionHTML}
              <div class="post-actions">
                <div class="action-item">
                  ${popoverHTML}
                  ${Icons.heart} React
                </div>
                <div class="action-item">${Icons.comment} Talk</div>
              </div>
            </div>
          `);
        });
      });
    };

    window.toggleEmoji = async (id, emoji) => {
      const postRef = doc(db, "posts", id);
      const reactions = allPostsData[id].reactions || {};
      reactions[currentUser.uid] = reactions[currentUser.uid] === emoji ? delete reactions[currentUser.uid] : emoji;
      await updateDoc(postRef, { reactions: reactions });
    };

    window.openPostModal = (id) => {
      activePostId = id;
      const data = allPostsData[id];
      document.getElementById('pm-content').innerHTML = `
        <div class="post-content" style="font-size:1.3rem;">${data.text || ''}</div>
        ${data.mediaUrl ? `<img src="${data.mediaUrl}" class="post-media">` : ''}
      `;
      document.getElementById('post-detail-modal').style.display = 'flex';
      loadComments(id);
    };

    function loadComments(id) {
      onSnapshot(query(collection(db, "posts", id, "comments"), orderBy("createdAt", "asc")), (snap) => {
        const div = document.getElementById('pm-comments');
        div.innerHTML = '';
        snap.forEach(d => {
          const c = d.data();
          const isOwner = c.authorUid === currentUser.uid || currentUser.email === ADMIN_EMAIL;
          div.insertAdjacentHTML('beforeend', `
            <div class="comment-card">
              <img src="${c.authorAvatar}" class="profile-avatar" style="width:32px; height:32px;">
              <div style="flex:1;">
                <div class="glass comment-bubble">
                  <div style="font-weight:900; font-size:0.8em; color:var(--primary);">${c.authorName}</div>
                  <div>${c.text}</div>
                </div>
                <div class="comment-tools">
                  <span class="tool-link" onclick="window.replyTo('${c.authorName}')">Reply</span>
                  ${isOwner ? `<span class="tool-link" onclick="window.editComment('${d.id}', '${c.text.replace(/'/g, "\\'")}')">Edit</span>` : ''}
                  ${isOwner ? `<span class="tool-link" onclick="window.deleteComment('${d.id}')">Delete</span>` : ''}
                </div>
              </div>
            </div>`);
        });
      });
    }

    window.replyTo = (name) => {
      const input = document.getElementById('comment-input');
      input.value = `@${name} ` + input.value;
      input.focus();
    };

    window.editComment = (id, text) => {
      editingCommentId = id;
      document.getElementById('edit-comment-textarea').value = text;
      document.getElementById('edit-comment-modal').style.display = 'flex';
    };

    document.getElementById('save-comment-btn').onclick = async () => {
      const text = document.getElementById('edit-comment-textarea').value.trim();
      await updateDoc(doc(db, "posts", activePostId, "comments", editingCommentId), { text: text });
      document.getElementById('edit-comment-modal').style.display = 'none';
    };

    window.deleteComment = async (id) => {
      if(confirm("Delete comment?")) await deleteDoc(doc(db, "posts", activePostId, "comments", id));
    };

    window.submitComment = async () => {
      const input = document.getElementById('comment-input');
      if (!input.value.trim()) return;
      await addDoc(collection(db, "posts", activePostId, "comments"), {
        text: input.value, authorName: userProfile.name, authorAvatar: userProfile.avatarUrl, authorUid: currentUser.uid, createdAt: serverTimestamp()
      });
      input.value = '';
    };

    // UI Helpers
    window.closePostModal = () => document.getElementById('post-detail-modal').style.display = 'none';
    document.getElementById('fab-compose').onclick = () => document.getElementById('compose-modal').style.display = 'flex';
    window.onclick = (e) => { if(e.target.className.includes('modal')) e.target.style.display = 'none'; };
    document.getElementById('google-signin-btn').onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
    document.getElementById('share-btn').onclick = async () => {
      await addDoc(collection(db, "posts"), {
        text: document.getElementById('postInput').value,
        mediaUrl: document.getElementById('post-image-url').value,
        authorName: userProfile.name, authorAvatar: userProfile.avatarUrl, authorUid: currentUser.uid, createdAt: serverTimestamp(), reactions: {}
      });
      document.getElementById('compose-modal').style.display = 'none';
    };
    window.toggleInput = (t) => { const i = document.getElementById('image-url-container'); i.style.display = i.style.display === 'none' ? 'block' : 'none'; };
  </script>
</body>
</html>
