<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>CLOSR</title>
  <style>
    /* CSS Variables for Light & Dark Theme */
    :root {
      --bg: #f8fafc;
      --text: #1e293b;
      --text-muted: #64748b;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --card-bg: rgba(255, 255, 255, 0.8);
      --card-border: rgba(255, 255, 255, 0.5);
      /* Soft, diffused box-shadows instead of hard borders */
      --glass-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.05);
      --input-bg: rgba(255, 255, 255, 0.5);
      --blob-1: rgba(59, 130, 246, 0.12);
      --blob-2: rgba(167, 139, 250, 0.12);
      --radius: 24px;
    }

    body.dark {
      --bg: #0f172a;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --primary: #60a5fa;
      --primary-hover: #3b82f6;
      --card-bg: rgba(30, 41, 59, 0.7);
      --card-border: rgba(255, 255, 255, 0.05);
      --glass-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.5);
      --input-bg: rgba(15, 23, 42, 0.6);
      --blob-1: rgba(59, 130, 246, 0.08);
      --blob-2: rgba(167, 139, 250, 0.08);
    }

    body { 
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      background-color: var(--bg); 
      background-image: radial-gradient(at 0% 0%, var(--blob-1) 0px, transparent 40%), radial-gradient(at 100% 100%, var(--blob-2) 0px, transparent 40%);
      background-attachment: fixed;
      color: var(--text); 
      margin: 0; padding: 0; min-height: 100vh;
      transition: background-color 0.4s, color 0.4s;
      -webkit-tap-highlight-color: transparent;
    }
    
    .container { max-width: 600px; margin: 0 auto; padding: 20px; padding-bottom: 100px; display: none; }
    
    .glass {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--card-border);
      box-shadow: var(--glass-shadow);
      border-radius: var(--radius);
    }

    /* Top Navigation */
    .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding: 10px 0; }
    .nav-title { font-size: 1.6rem; font-weight: 900; margin: 0; letter-spacing: -0.02em; }
    .nav-actions { display: flex; gap: 12px; }
    .icon-btn { background: var(--input-bg); border: 1px solid var(--card-border); color: var(--text); width: 44px; height: 44px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; backdrop-filter: blur(4px); transition: transform 0.2s, background 0.2s; box-shadow: var(--glass-shadow); }
    .icon-btn:active { transform: scale(0.9); }

    /* Profile Section */
    .profile-header { padding: 16px 20px; margin-bottom: 28px; display: flex; align-items: center; gap: 16px; cursor: pointer; transition: transform 0.2s; }
    .profile-header:active { transform: scale(0.98); }
    .profile-avatar { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; background: var(--input-bg); border: 2px solid var(--primary); padding: 2px; }
    .profile-name { font-weight: 800; font-size: 1.1em; }
    .profile-bio { color: var(--text-muted); font-size: 0.85em; margin-top: 2px; }

    /* FAB */
    .fab { position: fixed; bottom: max(24px, env(safe-area-inset-bottom)); right: 24px; width: 64px; height: 64px; border-radius: 50%; background: var(--primary); color: white; display: none; justify-content: center; align-items: center; box-shadow: 0 12px 30px rgba(59, 130, 246, 0.4); cursor: pointer; z-index: 900; transition: transform 0.2s, box-shadow 0.2s; }
    .fab:active { transform: scale(0.9); box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3); }

    /* Posts / Sparks */
    .post { padding: 20px; margin-bottom: 24px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; border: none; }
    .post:active { transform: scale(0.99); }
    .post-header { margin-bottom: 14px; display: flex; align-items: center; gap: 12px; }
    .author-name { font-weight: 700; font-size: 1em; }
    .timestamp { color: var(--text-muted); font-size: 0.8em; }
    .post-content { line-height: 1.6; margin-bottom: 16px; font-size: 1.05rem; }
    .post-media { width: 100%; border-radius: 18px; margin-bottom: 16px; max-height: 400px; object-fit: cover; box-shadow: var(--glass-shadow); }
    
    /* Reactions UI */
    .reaction-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .reaction-pill { background: var(--input-bg); border: 1px solid var(--card-border); padding: 6px 12px; border-radius: 999px; font-size: 0.85em; display: flex; align-items: center; gap: 5px; font-weight: 600; transition: transform 0.1s; }
    .reaction-pill.active { border-color: var(--primary); background: rgba(59, 130, 246, 0.1); }
    
    .reaction-selector { display: flex; justify-content: space-around; padding: 12px; background: var(--input-bg); border-radius: 99px; margin: 15px 0; border: 1px solid var(--card-border); }
    .reaction-btn { font-size: 1.5rem; cursor: pointer; transition: transform 0.2s; user-select: none; }
    .reaction-btn:active { transform: scale(1.4); }

    /* Post Detail Modal */
    .post-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; justify-content: center; align-items: flex-end; backdrop-filter: blur(8px); }
    .post-modal-card { width: 100%; max-height: 92vh; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); border-radius: 32px 32px 0 0; }
    @media (min-width: 600px) { 
      .post-modal-overlay { align-items: center; padding: 20px; }
      .post-modal-card { max-width: 500px; border-radius: 32px; height: 85vh; } 
    }
    
    .pm-header { padding: 20px 24px; border-bottom: 1px solid var(--card-border); display: flex; justify-content: space-between; align-items: center; font-weight: 800; background: var(--card-bg); }
    .pm-body { flex: 1; overflow-y: auto; padding: 24px; }
    .pm-footer { padding: 16px 20px max(16px, env(safe-area-inset-bottom)); border-top: 1px solid var(--card-border); background: var(--card-bg); display: flex; gap: 12px; align-items: center;}
    
    .comment-input { flex: 1; border: 1px solid var(--card-border); padding: 14px 20px; border-radius: 999px; outline: none; background: var(--input-bg); color: var(--text); font-size: 15px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); }
    .comment-box { padding: 16px; margin-bottom: 12px; display: flex; gap: 12px; border: none; }

    .btn { background: var(--primary); color: white; border: none; padding: 14px 28px; border-radius: 999px; cursor: pointer; font-weight: 700; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3); }
    .btn-outline { background: var(--input-bg); color: var(--text); border: 1px solid var(--card-border); padding: 10px 18px; border-radius: 999px; cursor: pointer; font-weight: 700; font-size: 14px; flex: 1; transition: background 0.2s; }
    .small-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 2000; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(8px); }
    .input-field { width: 100%; background: var(--input-bg); color: var(--text); border: 1px solid var(--card-border); border-radius: 16px; padding: 14px; font-size: 16px; margin-bottom: 16px; box-sizing: border-box; outline: none; }

    #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 3000; }
  </style>
</head>
<body>

  <script>
    const Icons = {
      comment: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>`,
      plus: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>`,
      send: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>`
    };
    const Emojis = ['❤️', '😂', '🙌', '😮', '🙏'];
  </script>

  <div id="login-screen">
    <div class="glass" style="padding: 40px; text-align: center; max-width: 320px; width: 90%;">
      <h2 style="margin-top: 0; font-weight: 900; font-size: 2.2rem; letter-spacing: -0.04em;">CLOSR</h2>
      <p style="color: var(--text-muted); margin-bottom: 32px; font-size: 0.95em;">Your family's private space.</p>
      <button class="btn" id="google-signin-btn" style="width: 100%;">Sign In with Google</button>
    </div>
  </div>

  <div class="container" id="app-container">
    <div class="nav-header">
      <h1 class="nav-title">CLOSR <span id="user-badge" style="font-size: 12px; font-weight: 700; color: var(--primary); text-transform: uppercase; margin-left: 8px; vertical-align: middle;"></span></h1>
      <div class="nav-actions">
        <button id="theme-toggle" class="icon-btn">
          <svg id="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
      </div>
    </div>
    
    <div class="profile-header glass" onclick="openProfileModal()">
      <img id="main-profile-avatar" class="profile-avatar" src="" alt="">
      <div class="profile-info">
        <div class="profile-name" id="main-profile-name">...</div>
        <div class="profile-bio" id="main-profile-bio">Welcome!</div>
      </div>
    </div>

    <div id="feed"></div>
  </div>

  <div id="fab-compose" class="fab" onclick="openComposeModal()"></div>

  <!-- COMPOSE MODAL -->
  <div id="compose-modal" class="small-modal">
    <div class="glass" style="width: 100%; max-width: 450px; padding: 24px;">
      <h3 style="margin-top:0; font-weight: 800;">Start a Conversation</h3>
      <textarea id="postInput" rows="4" placeholder="What's the latest?" style="width: 100%; background: transparent; border: none; outline: none; color: var(--text); font-size: 1.1rem; resize: none; margin-bottom: 10px;"></textarea>
      
      <div id="image-url-container" style="display: none; margin-bottom: 15px;">
        <input type="text" id="post-image-url" class="input-field" placeholder="Paste image link...">
      </div>

      <div style="display: flex; gap: 10px;">
        <button class="btn-outline" onclick="toggleImageUrlInput()">Add Photo</button>
        <button class="btn" id="share-btn" style="flex: 1.5;">Send to Family</button>
      </div>
    </div>
  </div>

  <!-- POST DETAIL MODAL -->
  <div id="post-detail-modal" class="post-modal-overlay">
    <div class="post-modal-card glass" style="border: none;">
      <div class="pm-header">
        <span>Story Details</span>
        <span onclick="closePostModal()" style="cursor: pointer; opacity: 0.5;">Close</span>
      </div>
      <div class="pm-body">
        <div id="pm-content"></div>
        <div id="pm-reactions"></div>
        <div id="pm-comments" style="margin-top: 24px;"></div>
      </div>
      <div class="pm-footer">
        <input type="text" id="comment-input" class="comment-input" placeholder="Say something nice...">
        <button class="icon-btn" onclick="submitComment()" style="background: var(--primary); color: white; border: none;">
          <script>document.write(Icons.send)</script>
        </button>
      </div>
    </div>
  </div>

  <!-- PROFILE MODAL -->
  <div id="profile-modal" class="small-modal">
    <div class="glass" style="width: 100%; max-width: 400px; padding: 24px;">
      <h3 style="margin-top:0; text-align: center; font-weight: 800;">Your Profile</h3>
      <input type="text" id="edit-profile-name" class="input-field" placeholder="Name">
      <input type="text" id="edit-profile-bio" class="input-field" placeholder="Bio">
      <input type="text" id="edit-profile-avatar-url" class="input-field" placeholder="Profile Photo URL">
      <button class="btn" id="save-profile-btn" style="width: 100%;">Update Profile</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, updateDoc, setDoc, getDoc, deleteField } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    // Configuration from your source[cite: 1]
    const firebaseConfig = {
      apiKey: "AIzaSyDusGOyWlAEpBUZ-Bm89vZ9SAqAMrWJt3E",
      authDomain: "anda-sol.firebaseapp.com",
      projectId: "anda-sol",
      storageBucket: "anda-sol.firebasestorage.app",
      messagingSenderId: "341991663482",
      appId: "1:341991663482:web:fe92b24241c2fe7a9b98c3"
    };

    const ADMIN_EMAIL = "amorsolo.villanda@gmail.com"; 
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let userProfile = {};
    let allPostsData = {};
    let activePostId = null;

    document.getElementById('fab-compose').innerHTML = Icons.plus;

    // Theme logic[cite: 1]
    const themeToggleBtn = document.getElementById('theme-toggle');
    themeToggleBtn.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      localStorage.setItem('closr-theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    });

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-container').style.display = 'block';
        document.getElementById('fab-compose').style.display = 'flex';
        
        const isAdm = user.email === ADMIN_EMAIL;
        document.getElementById('user-badge').innerText = isAdm ? "Admin" : "Family";

        const userRef = doc(db, "users", user.uid);
        const docSnap = await getDoc(userRef);
        userProfile = docSnap.exists() ? docSnap.data() : { name: user.displayName, bio: "Family member", avatarUrl: `https://ui-avatars.com/api/?name=${user.displayName}` };
        if(!docSnap.exists()) await setDoc(userRef, userProfile);
        
        updateProfileUI();
        loadPosts();
      }
    });

    function updateProfileUI() {
      document.getElementById('main-profile-name').innerText = userProfile.name;
      document.getElementById('main-profile-bio').innerText = userProfile.bio;
      document.getElementById('main-profile-avatar').src = userProfile.avatarUrl;
    }

    window.loadPosts = () => {
      const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
      onSnapshot(q, (snapshot) => {
        const feed = document.getElementById('feed');
        feed.innerHTML = '';
        snapshot.forEach((docSnap) => {
          const data = docSnap.id ? { ...docSnap.data(), id: docSnap.id } : docSnap.data();
          allPostsData[docSnap.id] = data;
          
          // Reaction summary
          const reactions = data.reactions || {};
          const reactionCounts = {};
          Object.values(reactions).forEach(emoji => reactionCounts[emoji] = (reactionCounts[emoji] || 0) + 1);
          
          let reactionHTML = '<div class="reaction-bar">';
          Object.entries(reactionCounts).forEach(([emoji, count]) => {
            reactionHTML += `<div class="reaction-pill">${emoji} <span>${count}</span></div>`;
          });
          reactionHTML += '</div>';

          feed.insertAdjacentHTML('beforeend', `
            <div class="post glass" onclick="window.openPostModal('${docSnap.id}')">
              <div class="post-header">
                <img src="${data.authorAvatar}" class="profile-avatar" style="width:40px; height:40px;">
                <div style="display:flex; flex-direction:column;">
                  <span class="author-name">${data.authorName}</span>
                  <span class="timestamp">${data.createdAt ? data.createdAt.toDate().toLocaleDateString() : 'Just now'}</span>
                </div>
              </div>
              <div class="post-content">${data.text || ''}</div>
              ${data.mediaUrl ? `<img src="${data.mediaUrl}" class="post-media">` : ''}
              ${reactionHTML}
            </div>
          `);
        });
      });
    };

    window.openPostModal = (postId) => {
      activePostId = postId;
      const data = allPostsData[postId];
      const reactions = data.reactions || {};
      const userReaction = reactions[currentUser.uid];

      document.getElementById('pm-content').innerHTML = `
        <div class="post-header">
          <img src="${data.authorAvatar}" class="profile-avatar" style="width:44px; height:44px;">
          <span class="author-name" style="font-size:1.1em;">${data.authorName}</span>
        </div>
        <div class="post-content" style="font-size:1.2rem;">${data.text || ''}</div>
        ${data.mediaUrl ? `<img src="${data.mediaUrl}" class="post-media">` : ''}
      `;

      let selectorHTML = '<div class="reaction-selector">';
      Emojis.forEach(emoji => {
        const isActive = userReaction === emoji;
        selectorHTML += `<span class="reaction-btn" onclick="window.toggleReaction('${postId}', '${emoji}')" style="${isActive ? 'filter: drop-shadow(0 0 8px var(--primary)); transform: scale(1.2);' : ''}">${emoji}</span>`;
      });
      selectorHTML += '</div>';
      document.getElementById('pm-reactions').innerHTML = selectorHTML;

      document.getElementById('post-detail-modal').style.display = 'flex';
      loadComments(postId);
    };

    window.toggleReaction = async (postId, emoji) => {
      if (window.navigator.vibrate) window.navigator.vibrate(10);
      const postRef = doc(db, "posts", postId);
      const data = allPostsData[postId];
      const reactions = data.reactions || {};
      
      if (reactions[currentUser.uid] === emoji) {
        delete reactions[currentUser.uid];
      } else {
        reactions[currentUser.uid] = emoji;
      }
      
      await updateDoc(postRef, { reactions: reactions });
      window.openPostModal(postId);
    };

    function loadComments(postId) {
      const q = query(collection(db, "posts", postId, "comments"), orderBy("createdAt", "asc"));
      onSnapshot(q, (snapshot) => {
        const div = document.getElementById('pm-comments');
        div.innerHTML = '';
        snapshot.forEach(d => {
          const c = d.data();
          div.insertAdjacentHTML('beforeend', `
            <div class="comment-box glass">
              <img src="${c.authorAvatar}" class="profile-avatar" style="width:32px; height:32px;">
              <div>
                <div class="author-name" style="font-size:0.9em;">${c.authorName}</div>
                <div style="font-size:0.95em; opacity:0.9;">${c.text}</div>
              </div>
            </div>
          `);
        });
      });
    }

    // Compose / Actions[cite: 1]
    window.openComposeModal = () => document.getElementById('compose-modal').style.display = 'flex';
    window.closePostModal = () => document.getElementById('post-detail-modal').style.display = 'none';
    window.toggleImageUrlInput = () => {
      const c = document.getElementById('image-url-container');
      c.style.display = c.style.display === 'none' ? 'block' : 'none';
    };

    document.getElementById('share-btn').onclick = async () => {
      const text = document.getElementById('postInput').value;
      const img = document.getElementById('post-image-url').value;
      if (!text && !img) return;
      await addDoc(collection(db, "posts"), {
        text: text,
        mediaUrl: img,
        authorName: userProfile.name,
        authorAvatar: userProfile.avatarUrl,
        createdAt: serverTimestamp(),
        reactions: {}
      });
      document.getElementById('postInput').value = '';
      document.getElementById('compose-modal').style.display = 'none';
    };

    window.submitComment = async () => {
      const input = document.getElementById('comment-input');
      if (!input.value.trim()) return;
      await addDoc(collection(db, "posts", activePostId, "comments"), {
        text: input.value,
        authorName: userProfile.name,
        authorAvatar: userProfile.avatarUrl,
        createdAt: serverTimestamp()
      });
      input.value = '';
    };

    window.onclick = (e) => {
      if (e.target.classList.contains('small-modal')) e.target.style.display = 'none';
      if (e.target.classList.contains('post-modal-overlay')) e.target.style.display = 'none';
    };

    document.getElementById('google-signin-btn').onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
    window.openProfileModal = () => {
      document.getElementById('edit-profile-name').value = userProfile.name;
      document.getElementById('edit-profile-bio').value = userProfile.bio;
      document.getElementById('edit-profile-avatar-url').value = userProfile.avatarUrl;
      document.getElementById('profile-modal').style.display = 'flex';
    };
    document.getElementById('save-profile-btn').onclick = async () => {
      const updated = {
        name: document.getElementById('edit-profile-name').value,
        bio: document.getElementById('edit-profile-bio').value,
        avatarUrl: document.getElementById('edit-profile-avatar-url').value
      };
      await setDoc(doc(db, "users", currentUser.uid), updated);
      userProfile = updated;
      updateProfileUI();
      document.getElementById('profile-modal').style.display = 'none';
    };
  </script>
</body>
</html>
