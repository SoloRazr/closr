<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <title>CLOSR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ===================== CSS Variables ===================== */
    :root {
      --bg: #f5f7fa;
      --text: #1a2236;
      --text-muted: #7a8499;
      --primary: #4f79f6;
      --primary-soft: rgba(79,121,246,0.1);
      --primary-hover: #3562e8;
      --card-bg: rgba(255,255,255,0.75);
      --card-border: rgba(255,255,255,0.6);
      --soft-shadow: 0 12px 40px rgba(30, 50, 120, 0.08);
      --input-bg: rgba(255,255,255,0.5);
      --blob-1: rgba(79,121,246,0.12);
      --blob-2: rgba(180,120,255,0.1);
      --blob-3: rgba(80,220,180,0.08);
      --danger: #ff4d4d;
      --radius: 24px;
      --radius-sm: 16px;
      --safe-bottom: max(20px, env(safe-area-inset-bottom));
      --safe-top: max(0px, env(safe-area-inset-top));
    }
    body.dark {
      --bg: #0b0f1a;
      --text: #e1e7f5;
      --text-muted: #8a96ae;
      --primary: #6d93ff;
      --primary-soft: rgba(109,147,255,0.12);
      --primary-hover: #4f79f6;
      --card-bg: rgba(20,28,48,0.75);
      --card-border: rgba(255,255,255,0.05);
      --soft-shadow: 0 15px 50px rgba(0,0,0,0.4);
      --input-bg: rgba(0,0,0,0.2);
    }

    /* ===================== Base ===================== */
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Nunito', system-ui, sans-serif;
      background-color: var(--bg);
      background-image:
        radial-gradient(circle at 10% 10%, var(--blob-1) 0px, transparent 40%),
        radial-gradient(circle at 90% 90%, var(--blob-2) 0px, transparent 40%);
      background-attachment: fixed;
      color: var(--text);
      margin: 0; padding: 0; min-height: 100vh;
      transition: background-color 0.4s, color 0.4s;
      -webkit-tap-highlight-color: transparent;
      overflow-x: hidden;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 20px 16px;
      padding-bottom: calc(var(--safe-bottom) + 100px);
      display: none;
    }

    /* ===================== Glass ===================== */
    .glass {
      background: var(--card-bg);
      backdrop-filter: blur(20px) saturate(1.6);
      -webkit-backdrop-filter: blur(20px) saturate(1.6);
      border: 1px solid var(--card-border);
      box-shadow: var(--soft-shadow);
      border-radius: var(--radius);
    }

    /* ===================== Icons ===================== */
    .icon { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; display: block; }
    .icon-sm { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; display: block; }
    .icon-filled { fill: currentColor; stroke: none; }

    /* ===================== Nav ===================== */
    .nav-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px;
      padding: calc(var(--safe-top) + 12px) 4px 0;
    }
    .nav-title {
      font-family: 'Sora', sans-serif;
      font-size: 1.8rem; font-weight: 800; margin: 0;
      letter-spacing: -1px;
    }
    .nav-title span { color: var(--primary); }
    .icon-btn {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--text);
      width: 46px; height: 46px; border-radius: 16px;
      display: flex; justify-content: center; align-items: center;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
    }
    .icon-btn:active { transform: scale(0.92); }

    /* ===================== Profile Card ===================== */
    .profile-header {
      padding: 16px 16px; margin-bottom: 24px;
      display: flex; align-items: center; gap: 14px;
      cursor: pointer;
    }
    .profile-avatar {
      width: 58px; height: 58px; border-radius: 20px;
      object-fit: cover; border: 2px solid var(--primary);
    }
    .profile-info { flex: 1; }
    .profile-name { font-family: 'Sora', sans-serif; font-weight: 800; font-size: 1.1rem; }
    .profile-bio { color: var(--text-muted); font-size: 0.85rem; margin-top: 2px; }

    /* ===================== FAB ===================== */
    .fab {
      position: fixed;
      bottom: var(--safe-bottom);
      right: 20px;
      width: 60px; height: 60px; border-radius: 22px;
      background: var(--primary);
      color: white;
      display: none; justify-content: center; align-items: center;
      box-shadow: 0 10px 25px rgba(79,121,246,0.3);
      cursor: pointer; z-index: 900;
      transition: transform 0.2s;
    }
    .fab:active { transform: scale(0.9); }

    /* ===================== Inputs ===================== */
    input, textarea {
      font-size: 16px !important; /* Prevents iOS Zoom */
      font-family: 'Nunito', sans-serif;
    }
    .input-field {
      width: 100%; background: var(--input-bg); color: var(--text);
      border: 1px solid var(--card-border); border-radius: var(--radius-sm);
      padding: 14px 16px; margin-bottom: 12px;
      outline: none; transition: border-color 0.2s;
    }
    .input-field:focus { border-color: var(--primary); }

    .btn {
      background: var(--primary);
      color: white; border: none; padding: 14px 24px;
      border-radius: var(--radius-sm); cursor: pointer;
      font-weight: 800; font-size: 16px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%;
    }
    .btn-outline {
      background: transparent; color: var(--text);
      border: 1px solid var(--card-border);
      padding: 12px; border-radius: var(--radius-sm);
      font-weight: 700; cursor: pointer;
    }

    /* ===================== Posts ===================== */
    .post { padding: 18px; margin-bottom: 18px; }
    .post-header { margin-bottom: 14px; display: flex; align-items: center; gap: 12px; }
    .author-name { font-family: 'Sora', sans-serif; font-weight: 700; }
    .timestamp { color: var(--text-muted); font-size: 0.8rem; }
    .post-content { line-height: 1.6; margin-bottom: 14px; }
    .post-media {
      width: 100%; border-radius: var(--radius-sm);
      margin-bottom: 14px; border: 1px solid var(--card-border);
    }
    .post-stats { display: flex; gap: 18px; color: var(--text-muted); font-weight: 700; font-size: 0.9rem; }

    /* ===================== Modern Modals ===================== */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); z-index: 1000;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      justify-content: center; align-items: center;
      padding: 20px;
    }
    .modal-card {
      width: 100%; max-width: 420px;
      max-height: 85vh; overflow-y: auto;
      animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
    }
    @keyframes popIn {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    /* Specifically for Post Detail to feel like a "Pop up card" */
    #post-detail-modal .modal-card {
      background: var(--bg);
      border-radius: var(--radius);
      display: flex; flex-direction: column;
    }
    .pm-body { padding: 20px; flex: 1; overflow-y: auto; }
    .pm-footer {
      padding: 12px 16px var(--safe-bottom);
      background: var(--card-bg);
      border-top: 1px solid var(--card-border);
      display: flex; gap: 10px;
    }
    .comment-input {
      flex: 1; padding: 12px 18px; border-radius: 99px;
      background: var(--input-bg); border: 1px solid var(--card-border);
      outline: none; color: var(--text);
    }

    /* Small modals (Delete/Edit) */
    .small-modal-card {
      padding: 24px;
      text-align: center;
    }
  </style>
</head>
<body>

  <script>
    // Modernized Icon Set (Inline SVGs)
    const Icons = {
      heart: `<svg class="icon-sm" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>`,
      heartFilled: `<svg class="icon-sm icon-filled" style="color:#ff4d4d" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>`,
      comment: `<svg class="icon-sm" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>`,
      plus: `<svg class="icon" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>`,
      send: `<svg class="icon-sm" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>`,
      x: `<svg class="icon-sm" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`,
      trash: `<svg class="icon-sm" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>`,
      edit: `<svg class="icon-sm" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>`
    };
  </script>

  <div id="login-screen">
    <div class="modal-overlay" style="display:flex;">
      <div class="modal-card glass small-modal-card">
        <h1 class="nav-title" style="font-size: 2.5rem; margin-bottom: 10px;">CLOS<span>R</span></h1>
        <p style="color:var(--text-muted); margin-bottom:30px;">Family, kept close.</p>
        <button class="btn" id="google-signin-btn">Continue with Google</button>
      </div>
    </div>
  </div>

  <div class="container" id="app-container">
    <header class="nav-header">
      <h1 class="nav-title">CLOS<span>R</span></h1>
      <button id="theme-toggle" class="icon-btn">
        <svg id="theme-icon" class="icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
      </button>
    </header>

    <div class="profile-header glass" onclick="openProfileModal()">
      <img id="main-profile-avatar" class="profile-avatar" src="https://ui-avatars.com/api/?name=User" alt="Profile">
      <div class="profile-info">
        <div class="profile-name" id="main-profile-name">Loading...</div>
        <div class="profile-bio" id="main-profile-bio">Tap to edit profile</div>
      </div>
    </div>

    <div id="feed"></div>
  </div>

  <div id="fab-compose" class="fab" onclick="openComposeModal()"></div>

  <!-- Unified Modal Logic -->
  <div id="post-detail-modal" class="modal-overlay" onclick="handleOutsideClick(event, 'post-detail-modal')">
    <div class="modal-card glass">
      <div class="pm-body">
        <div style="display:flex; justify-content:flex-end; margin-bottom:10px;">
          <span style="cursor:pointer; color:var(--text-muted);" onclick="closePostModal()"><script>document.write(Icons.x)</script></span>
        </div>
        <div id="pm-content"></div>
        <div id="pm-comments" style="margin-top:20px;"></div>
      </div>
      <div class="pm-footer">
        <input type="text" id="comment-input" class="comment-input" placeholder="Add a comment...">
        <button class="icon-btn" onclick="submitComment()" style="background:var(--primary); color:white; border:none; width:44px; height:44px;"><script>document.write(Icons.send)</script></button>
      </div>
    </div>
  </div>

  <!-- Profile Edit Modal -->
  <div id="profile-modal" class="modal-overlay" onclick="handleOutsideClick(event, 'profile-modal')">
    <div class="modal-card glass small-modal-card">
      <h3 style="margin-top:0">Edit Profile</h3>
      <input type="text" id="edit-profile-name" class="input-field" placeholder="Name">
      <input type="text" id="edit-profile-bio" class="input-field" placeholder="Bio">
      <button class="btn" id="save-profile-btn">Save Profile</button>
    </div>
  </div>

  <!-- Compose Modal -->
  <div id="compose-modal" class="modal-overlay" onclick="handleOutsideClick(event, 'compose-modal')">
    <div class="modal-card glass small-modal-card">
      <h3 style="margin-top:0">New Post</h3>
      <textarea id="postInput" class="input-field" rows="4" placeholder="What's on your mind?"></textarea>
      <input type="text" id="post-media-url" class="input-field" placeholder="Image/Video URL (optional)">
      <button class="btn" id="share-btn">Post Now</button>
    </div>
  </div>

  <script type="module">
    // --- UI HELPERS ---
    window.handleOutsideClick = (e, modalId) => {
      if (e.target.id === modalId) {
        document.getElementById(modalId).style.display = 'none';
      }
    };

    window.openComposeModal = () => document.getElementById('compose-modal').style.display = 'flex';
    window.openProfileModal = () => document.getElementById('profile-modal').style.display = 'flex';
    window.closePostModal = () => document.getElementById('post-detail-modal').style.display = 'none';
    
    document.getElementById('fab-compose').innerHTML = Icons.plus;

    // --- LOGIC (Firebase Config & Auth placeholder for demo) ---
    // (Existing Firebase logic remains compatible, just ensure IDs match)
    
    // Example Theme Toggle update
    const themeBtn = document.getElementById('theme-toggle');
    themeBtn.onclick = () => {
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      document.getElementById('theme-icon').innerHTML = isDark 
        ? `<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>`
        : `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>`;
    };

    // Note: The rest of your Firebase initialization (auth, Firestore) 
    // should be pasted below to connect the functionality.

<!-- ===== FIREBASE LOGIC ===== -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, deleteDoc, updateDoc, arrayUnion, arrayRemove, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDusGOyWlAEpBUZ-Bm89vZ9SAqAMrWJt3E",
      authDomain: "anda-sol.firebaseapp.com",
      projectId: "anda-sol",
      storageBucket: "anda-sol.firebasestorage.app",
      messagingSenderId: "341991663482",
      appId: "1:341991663482:web:fe92b24241c2fe7a9b98c3"
    };

    const ADMIN_EMAIL = "amorsolo.villanda@gmail.com";
    // Members who can post (in addition to admin)
    const MEMBER_EMAILS = []; // Add family/friend emails here e.g. ["sister@gmail.com"]

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let currentUserRole = 'guest'; // 'admin' | 'member' | 'guest'
    let userProfile = { name: '', bio: '', avatarUrl: '' };
    let allPostsData = {};
    let activePostId = null;
    let commentsUnsubscribe = null;
    let selectedDuration = 1; // days
    let activeMediaTab = 'photo';

    const defaultAvatar = "https://ui-avatars.com/api/?background=4f79f6&color=fff&name=";

    // ---- THEME ----
    const themeToggleBtn = document.getElementById('theme-toggle');
    const themeIcon = document.getElementById('theme-icon');
    function updateThemeIcon(isDark) {
      themeIcon.innerHTML = isDark
        ? `<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>`
        : `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>`;
    }
    const savedTheme = localStorage.getItem('closr-theme');
    if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.body.classList.add('dark'); updateThemeIcon(true);
    }
    themeToggleBtn.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      localStorage.setItem('closr-theme', isDark ? 'dark' : 'light');
      updateThemeIcon(isDark);
    });

    // ---- AUTH ----
    document.getElementById('google-signin-btn').addEventListener('click', () => {
      signInWithPopup(auth, new GoogleAuthProvider()).catch(() => alert("Login failed. Please try again."));
    });

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-container').style.display = 'block';

        if (user.email === ADMIN_EMAIL) {
          currentUserRole = 'admin';
          document.getElementById('user-badge').innerText = "✦ Admin";
          document.getElementById('fab-compose').style.display = 'flex';
        } else if (MEMBER_EMAILS.includes(user.email)) {
          currentUserRole = 'member';
          document.getElementById('user-badge').innerText = "Family";
          document.getElementById('fab-compose').style.display = 'flex';
        } else {
          currentUserRole = 'guest';
          document.getElementById('user-badge').innerText = "Family";
          document.getElementById('fab-compose').style.display = 'none';
        }

        const userRef = doc(db, "users", user.uid);
        const docSnap = await getDoc(userRef);
        if (docSnap.exists()) {
          userProfile = docSnap.data();
        } else {
          userProfile = {
            name: user.displayName || user.email.split('@')[0],
            bio: "Happy to be here! 💙",
            avatarUrl: defaultAvatar + encodeURIComponent(user.displayName || "User")
          };
          await setDoc(userRef, userProfile);
        }
        updateProfileUI();
        loadPosts();
      } else {
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('app-container').style.display = 'none';
        document.getElementById('fab-compose').style.display = 'none';
      }
    });

    function updateProfileUI() {
      document.getElementById('main-profile-name').innerText = userProfile.name;
      document.getElementById('main-profile-bio').innerText = userProfile.bio;
      document.getElementById('main-profile-avatar').src = userProfile.avatarUrl;
    }
  </script>
</body>
</html>
