<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <style>
    /* ===================== CSS Variables ===================== */
    :root {
      --bg: #eef2f7;
      --text: #1a2236;
      --text-muted: #7a8499;
      --primary: #4f79f6;
      --primary-soft: rgba(79,121,246,0.13);
      --primary-hover: #3562e8;
      --card-bg: rgba(255,255,255,0.72);
      --card-border: rgba(255,255,255,0.85);
      --glass-shadow: 0 12px 40px rgba(30,50,120,0.1);
      --input-bg: rgba(255,255,255,0.55);
      --blob-1: rgba(79,121,246,0.14);
      --blob-2: rgba(180,120,255,0.12);
      --blob-3: rgba(80,220,180,0.09);
      --danger: #f44;
      --radius: 24px;
      --radius-sm: 16px;
      --safe-bottom: max(20px, env(safe-area-inset-bottom));
      --safe-top: max(0px, env(safe-area-inset-top));
    }
    body.dark {
      --bg: #0f1520;
      --text: #edf2ff;
      --text-muted: #7b8baa;
      --primary: #6390ff;
      --primary-soft: rgba(99,144,255,0.15);
      --primary-hover: #4f79f6;
      --card-bg: rgba(22,33,60,0.72);
      --card-border: rgba(255,255,255,0.07);
      --glass-shadow: 0 15px 45px rgba(0,0,0,0.45);
      --input-bg: rgba(10,15,30,0.55);
      --blob-1: rgba(79,121,246,0.09);
      --blob-2: rgba(170,100,255,0.08);
      --blob-3: rgba(60,200,160,0.06);
    }

    /* ===================== Base ===================== */
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Nunito', system-ui, sans-serif;
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse at 10% 10%, var(--blob-1) 0px, transparent 55%),
        radial-gradient(ellipse at 90% 90%, var(--blob-2) 0px, transparent 55%),
        radial-gradient(ellipse at 50% 50%, var(--blob-3) 0px, transparent 60%);
      background-attachment: fixed;
      color: var(--text);
      margin: 0; padding: 0; min-height: 100vh;
      transition: background-color 0.3s, color 0.3s;
      -webkit-tap-highlight-color: transparent;
    }
    .container {
      max-width: 560px;
      margin: 0 auto;
      padding: 20px 16px;
      padding-bottom: calc(var(--safe-bottom) + 86px);
      display: none;
    }

    /* ===================== Glass ===================== */
    .glass {
      background: var(--card-bg);
      backdrop-filter: blur(18px) saturate(1.4);
      -webkit-backdrop-filter: blur(18px) saturate(1.4);
      border: 1.5px solid var(--card-border);
      box-shadow: var(--glass-shadow);
      border-radius: var(--radius);
    }

    /* ===================== Modals: Floating Centered Fix ===================== */
    .post-modal-overlay, .small-modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.55); z-index: 1000;
      justify-content: center; align-items: center; /* Floating centered */
      padding: 20px;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }

    .post-modal-card, .modal-card {
      width: 100%; max-width: 500px;
      max-height: 85vh; /* Keep it comfortably on screen */
      background: var(--bg);
      border-radius: var(--radius);
      border: 1.5px solid var(--card-border);
      box-shadow: var(--glass-shadow);
      display: flex; flex-direction: column;
      overflow: hidden;
      animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes popIn {
      from { transform: scale(0.9) translateY(10px); opacity: 0; }
      to { transform: scale(1) translateY(0); opacity: 1; }
    }

    /* ===================== Inputs: No-Zoom Fix ===================== */
    .input-field, textarea, .comment-input {
      width: 100%; background: var(--input-bg); color: var(--text);
      border: 1.5px solid var(--card-border); border-radius: var(--radius-sm);
      padding: 13px 16px; font-size: 16px; /* Stop iOS auto-zoom */
      margin-bottom: 14px; outline: none;
      font-family: 'Nunito', sans-serif;
      transition: border-color 0.2s;
    }

    /* ===================== Nav & Profile ===================== */
    .nav-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 22px;
      padding: calc(var(--safe-top) + 8px) 2px 0;
    }
    .nav-title { font-family: 'Sora', sans-serif; font-size: 1.65rem; font-weight: 800; letter-spacing: -0.5px; }
    .nav-title span.logo-dot { color: var(--primary); }
    .icon-btn {
      background: var(--card-bg); border: 1.5px solid var(--card-border);
      width: 44px; height: 44px; border-radius: 50%; display: flex; justify-content: center; align-items: center;
      cursor: pointer; transition: transform 0.18s;
    }
    .profile-header { padding: 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 16px; cursor: pointer; }
    .profile-avatar { width: 62px; height: 62px; border-radius: 50%; border: 2.5px solid var(--primary); object-fit: cover; }
    .avatar-sm { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
    .avatar-xs { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }

    /* ===================== Posts & Feed ===================== */
    .post { padding: 20px; margin-bottom: 16px; cursor: pointer; }
    .post-header { margin-bottom: 12px; display: flex; align-items: center; gap: 12px; }
    .author-name { font-family: 'Sora', sans-serif; font-weight: 700; }
    .timestamp { color: var(--text-muted); font-size: 0.82em; }
    .post-media { width: 100%; border-radius: var(--radius-sm); margin-bottom: 14px; object-fit: cover; }
    .post-stats { display: flex; gap: 20px; color: var(--text-muted); border-top: 1.5px solid var(--card-border); padding-top: 13px; font-weight: 700; }

    /* ===================== Buttons & Tabs ===================== */
    .btn {
      background: linear-gradient(135deg, var(--primary), #7b5fe8);
      color: white; border: none; padding: 13px 26px; border-radius: 9999px;
      font-weight: 800; font-size: 15px; cursor: pointer; box-shadow: 0 4px 16px rgba(79,121,246,0.3);
    }
    .btn-outline {
      background: var(--input-bg); border: 1.5px solid var(--card-border); color: var(--text);
      padding: 11px 18px; border-radius: 9999px; font-weight: 700; display: flex; align-items: center; gap: 6px; flex: 1;
    }
    .media-tab {
      flex: 1; padding: 8px 10px; border-radius: 10px; border: 1.5px solid var(--card-border);
      background: var(--input-bg); color: var(--text-muted); font-weight: 700; cursor: pointer; font-size: 13px;
    }
    .media-tab.active { background: var(--primary-soft); border-color: var(--primary); color: var(--primary); }

    /* ===================== Floating Action Button ===================== */
    .fab {
      position: fixed; bottom: var(--safe-bottom); right: 20px; width: 62px; height: 62px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), #7b5fe8); color: white;
      display: none; justify-content: center; align-items: center; z-index: 900; box-shadow: 0 8px 28px rgba(79,121,246,0.45);
    }

    /* ===================== Reactions ===================== */
    .reaction-wrap { position: relative; display: inline-flex; }
    .emoji-bar {
      position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%) scale(0.85);
      background: var(--card-bg); border: 1.5px solid var(--card-border); border-radius: 999px; padding: 6px 10px;
      display: flex; gap: 4px; opacity: 0; pointer-events: none; transition: all 0.18s; z-index: 50;
    }
    .reaction-wrap.show-emojis .emoji-bar { opacity: 1; pointer-events: auto; transform: translateX(-50%) scale(1); }
    .emoji-opt { font-size: 1.4rem; cursor: pointer; padding: 4px 5px; transition: transform 0.15s; }
    .emoji-opt:active { transform: scale(1.35); }

    .icon { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2; }
    .icon-sm { width: 17px; height: 17px; fill: none; stroke: currentColor; stroke-width: 2; }
  </style>
</head>
<body>

  <script>
    const Icons = {
      heart: `<svg class="icon-sm" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>`,

      edit: `<svg class="icon-sm" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>`,
      trash: `<svg class="icon-sm" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>`,

    };
  </script>

  <!-- Login Screen -->
  <div id="login-screen">
    <div class="login-card glass" style="position:fixed; inset:0; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:24px; z-index:100;">
      <div class="glass" style="max-width:340px; padding:40px; text-align:center;">
        <h1 style="font-family:'Sora'; font-size:2.6rem; margin-bottom:5px;">CLOS<span style="color:var(--primary);">R</span></h1>
        <p style="color:var(--text-muted); margin-bottom:30px;">Family, kept close. 💙</p>
        <button class="btn" id="google-signin-btn" style="width:100%;">Continue with Google</button>
      </div>
    </div>
  </div>

  <div class="container" id="app-container">
    <div class="nav-header">
      <h1 class="nav-title">CLOS<span class="logo-dot">R</span> <span id="user-badge" style="font-size:13px; font-weight:600; color:var(--text-muted);"></span></h1>
      <button id="theme-toggle" class="icon-btn"><svg id="theme-icon" class="icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg></button>
    </div>

    <div class="profile-header glass" onclick="openProfileModal()">
      <img id="main-profile-avatar" class="profile-avatar" src="" alt="Profile">
      <div class="profile-info">
        <div class="profile-name" id="main-profile-name" style="font-weight:800; font-size:1.15rem;">Loading…</div>
        <div class="profile-bio" id="main-profile-bio" style="font-size:0.88rem; color:var(--text-muted);">Welcome back!</div>
      </div>
    </div>
    <div id="feed"></div>
  </div>

  <div id="fab-compose" class="fab" onclick="openComposeModal()">
    <svg class="icon" viewBox="0 0 24 24" style="stroke-width:3;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
  </div>

  <!-- Modals -->
  <div id="compose-modal" class="small-modal" onclick="handleSmallModalClick(event)">
    <div class="modal-card glass">
      <h3 style="margin-top:0;">✏️ New Post</h3>
      <textarea id="postInput" rows="3" placeholder="What's going on today?"></textarea>
      
      <div id="media-url-unified" style="display:none; margin-bottom:14px;">
        <div style="display:flex; gap:8px; margin-bottom:10px;">
          <button class="media-tab active" id="tab-photo" onclick="setMediaTab('photo')">Photo</button>
          <button class="media-tab" id="tab-video" onclick="setMediaTab('video')">Video/YT</button>
        </div>
        <input type="text" id="post-media-url" class="input-field" style="margin-bottom:0;" placeholder="Paste link here...">
      </div>

      <div style="margin-bottom:16px;">
        <label style="font-size:12px; font-weight:800; color:var(--text-muted); display:block; margin-bottom:8px;">⏳ DURATION</label>
        <div style="display:flex; gap:8px;">
          <button class="media-tab active" id="dur-1" onclick="setDuration(1, this)">24h</button>
          <button class="media-tab" id="dur-7" onclick="setDuration(7, this)">7d</button>
          <button class="media-tab" id="dur-15" onclick="setDuration(15, this)">15d</button>
        </div>
      </div>

      <div style="display:flex; gap:10px;">
        <button class="btn-outline" onclick="toggleMediaInput()">Add Media</button>
        <button class="btn" id="share-btn" style="flex:1.5;">Share</button>
      </div>
    </div>
  </div>

  <div id="post-detail-modal" class="post-modal-overlay" onclick="handleModalOverlayClick(event)">
    <div class="post-modal-card">
      <div class="pm-header">
        <span>Post Details</span>
        <span onclick="closePostModal()" style="cursor:pointer; color:var(--text-muted); padding:5px;">✕</span>
      </div>
      <div class="pm-body">
        <div id="pm-content"></div>
        <h4 style="color:var(--text-muted); margin-top:20px; font-size:0.9rem;">💬 COMMENTS</h4>
        <div id="pm-comments"></div>
      </div>
      <div class="pm-footer">
        <input type="text" id="comment-input" class="comment-input" placeholder="Write a comment..." style="margin-bottom:0;">
        <button class="btn" onclick="submitComment()" style="padding:10px 15px;">Send</button>
      </div>
    </div>

  <div id="profile-modal" class="small-modal" onclick="handleSmallModalClick(event)">
    <div class="modal-card glass">
      <h3>👤 Edit Profile</h3>

      <input type="text" id="edit-profile-bio" class="input-field" placeholder="Bio">
      <input type="text" id="edit-profile-avatar-url" class="input-field" placeholder="Photo URL">
      <button class="btn" id="save-profile-btn" style="width:100%;">Save Profile</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, updateDoc, setDoc, getDoc, deleteDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDusGOyWlAEpBUZ-Bm89vZ9SAqAMrWJt3E",
      authDomain: "anda-sol.firebaseapp.com",
      projectId: "anda-sol",
      storageBucket: "anda-sol.firebasestorage.app",
      messagingSenderId: "341991663482",
      appId: "1:341991663482:web:fe92b24241c2fe7a9b98c3"
    };

    const ADMIN_EMAIL = "amorsolo.villanda@gmail.com";
    const MEMBER_EMAILS = []; // RESTORED: Add family emails here

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let currentUserRole = 'guest';
    let userProfile = {};
    let selectedDuration = 1;
    let activePostId = null;

    // --- Auth & Profile ---
    document.getElementById('google-signin-btn').addEventListener('click', () => signInWithPopup(auth, new GoogleAuthProvider()));

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-container').style.display = 'block';

        if (user.email === ADMIN_EMAIL) {
          currentUserRole = 'admin';
          document.getElementById('user-badge').innerText = "✦ Admin";
          document.getElementById('fab-compose').style.display = 'flex';
        } else if (MEMBER_EMAILS.includes(user.email)) {
          currentUserRole = 'member';
          document.getElementById('user-badge').innerText = "Family";
          document.getElementById('fab-compose').style.display = 'flex';
        } else {
          currentUserRole = 'guest';
          document.getElementById('user-badge').innerText = "Family";
        }

        const userRef = doc(db, "users", user.uid);
        const snap = await getDoc(userRef);
        userProfile = snap.exists() ? snap.data() : { name: user.displayName, bio: "Happy to be here! 💙", avatarUrl: user.photoURL };
        if (!snap.exists()) await setDoc(userRef, userProfile);
        
        updateProfileUI();
        loadPosts();
      } else {
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('app-container').style.display = 'none';
      }
    });

    function updateProfileUI() {
      document.getElementById('main-profile-name').innerText = userProfile.name;
      document.getElementById('main-profile-bio').innerText = userProfile.bio;
      document.getElementById('main-profile-avatar').src = userProfile.avatarUrl;
    }

    // --- Feed & Posts ---
    function loadPosts() {
      const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
      onSnapshot(q, (snap) => {
        const feed = document.getElementById('feed');
        feed.innerHTML = '';
        snap.forEach(docSnap => {
          const data = docSnap.data();
          const expiresAt = new Date(data.expiresAt);
          if (expiresAt < new Date()) return;

          const postEl = document.createElement('div');
          postEl.className = 'post glass';
          postEl.onclick = () => openPostModal(docSnap.id, data);
          postEl.innerHTML = `
            <div class="post-header">
              <img src="${data.authorAvatar}" class="avatar-sm">
              <div>
                <div class="author-name">${data.authorName}</div>
                <div class="timestamp">${data.createdAt ? formatTime(data.createdAt.toDate()) : 'Just now'}</div>
              </div>
            </div>
            <div style="margin-bottom:10px;">${data.text}</div>
            ${data.mediaUrl ? `<img src="${data.mediaUrl}" class="post-media">` : ''}
            <div class="post-stats"><span>❤️ ${data.likedBy?.length || 0}</span><span>💬 Comments</span></div>
          `;
          feed.appendChild(postEl);
        });
      });
    }

    window.openPostModal = async (id, data) => {
      activePostId = id;
      document.getElementById('pm-content').innerHTML = `<strong>${data.authorName}</strong><p>${data.text}</p>`;
      document.getElementById('post-detail-modal').style.display = 'flex';
      loadComments(id);
    };

    function loadComments(postId) {
      const q = query(collection(db, "posts", postId, "comments"), orderBy("createdAt", "asc"));
      onSnapshot(q, (snap) => {
        const list = document.getElementById('pm-comments');
        list.innerHTML = '';
        snap.forEach(c => list.insertAdjacentHTML('beforeend', `<div style="margin-bottom:10px;"><strong>${c.data().authorName}:</strong> ${c.data().text}</div>`));
      });
    }

    window.submitComment = async () => {
      const input = document.getElementById('comment-input');
      if (!input.value.trim()) return;
      await addDoc(collection(db, "posts", activePostId, "comments"), {
        text: input.value, authorName: userProfile.name, createdAt: serverTimestamp()
      });
      input.value = '';
    };

    document.getElementById('share-btn').addEventListener('click', async () => {
      const text = document.getElementById('postInput').value;
      const expiresAt = new Date();
      expiresAt.setDate(expiresAt.getDate() + selectedDuration);
      
      await addDoc(collection(db, "posts"), {
        text, authorName: userProfile.name, authorAvatar: userProfile.avatarUrl, authorUid: currentUser.uid,
        createdAt: serverTimestamp(), expiresAt: expiresAt.toISOString(), likedBy: []
      });
      document.getElementById('postInput').value = '';
      document.getElementById('compose-modal').style.display = 'none';
    });

    // --- UI Helpers ---
    window.setDuration = (d, btn) => {
      selectedDuration = d;
      document.querySelectorAll('[id^="dur-"]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };
    window.toggleMediaInput = () => {
      const box = document.getElementById('media-url-unified');
      box.style.display = box.style.display === 'none' ? 'block' : 'none';
    };
    window.openComposeModal = () => document.getElementById('compose-modal').style.display = 'flex';
    window.openProfileModal = () => document.getElementById('profile-modal').style.display = 'flex';
    window.closePostModal = () => document.getElementById('post-detail-modal').style.display = 'none';
    window.handleSmallModalClick = (e) => { if(e.target.classList.contains('small-modal')) e.target.style.display = 'none'; };
    window.handleModalOverlayClick = (e) => { if(e.target.classList.contains('post-modal-overlay')) closePostModal(); };

    function formatTime(date) {
      const diff = Math.floor((Date.now() - date.getTime()) / 1000);
      if (diff < 60) return 'Just now';
      if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
      return `${Math.floor(diff/3600)}h ago`;
    }

    document.getElementById('theme-toggle').addEventListener('click', () => document.body.classList.toggle('dark'));
  </script>
</body>
</html>
