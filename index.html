<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CLOSR</title>
  <style>
    /* CSS Variables for Light & Dark Theme */
    :root {
      --bg: #f3f4f6;
      --text: #1f2937;
      --text-muted: #6b7280;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --card-bg: rgba(255, 255, 255, 0.7);
      --card-border: rgba(255, 255, 255, 0.5);
      --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
      --input-bg: rgba(255, 255, 255, 0.5);
      --blob-1: rgba(59, 130, 246, 0.15);
      --blob-2: rgba(167, 139, 250, 0.15);
    }

    body.dark {
      --bg: #111827;
      --text: #f9fafb;
      --text-muted: #9ca3af;
      --primary: #60a5fa;
      --primary-hover: #3b82f6;
      --card-bg: rgba(31, 41, 55, 0.6);
      --card-border: rgba(255, 255, 255, 0.08);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
      --input-bg: rgba(17, 24, 39, 0.5);
      --blob-1: rgba(59, 130, 246, 0.1);
      --blob-2: rgba(167, 139, 250, 0.1);
    }

    /* Ambient Background & Global */
    body { 
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      background-color: var(--bg); 
      background-image: radial-gradient(at 0% 0%, var(--blob-1) 0px, transparent 50%), radial-gradient(at 100% 100%, var(--blob-2) 0px, transparent 50%);
      background-attachment: fixed;
      color: var(--text); 
      margin: 0; padding: 0; min-height: 100vh;
      transition: background-color 0.3s, color 0.3s;
      -webkit-tap-highlight-color: transparent;
    }
    
    .container { max-width: 600px; margin: 0 auto; padding: 20px; padding-bottom: 90px; display: none; }
    
    /* Glassmorphism Utility */
    .glass {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      box-shadow: var(--glass-shadow);
      border-radius: 16px;
    }

    /* SVG Icon Utility */
    .icon { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .icon-sm { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .icon-filled { fill: currentColor; stroke: none; }
    .text-red { color: #ef4444; }

    /* Top Navigation */
    .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 10px 0; }
    .nav-title { font-size: 1.5rem; font-weight: 800; margin: 0; display: flex; align-items: center; gap: 8px;}
    .nav-actions { display: flex; gap: 12px; align-items: center; }
    .icon-btn { background: var(--input-bg); border: 1px solid var(--card-border); color: var(--text); width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; backdrop-filter: blur(4px); transition: transform 0.2s; }
    .icon-btn:active { transform: scale(0.9); }

    /* Login Screen */
    #login-screen { position: fixed; inset: 0; background: var(--card-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
    .login-card { padding: 40px; text-align: center; max-width: 300px; width: 90%; }
    .login-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 12px; margin-top: 10px; cursor: pointer; font-weight: bold; font-size: 16px; }

    /* Profile Section */
    .profile-header { padding: 20px; margin-bottom: 24px; display: flex; align-items: center; gap: 16px; position: relative; }
    .profile-avatar { width: 64px; height: 64px; border-radius: 50%; object-fit: cover; background: var(--input-bg); border: 2px solid var(--primary); }
    .profile-info { flex: 1; }
    .profile-name { font-weight: 800; font-size: 1.2em; margin-bottom: 4px; }
    .profile-bio { color: var(--text-muted); font-size: 0.9em; line-height: 1.4; }
    .edit-profile-btn { background: var(--input-bg); color: var(--text); border: 1px solid var(--card-border); padding: 8px 16px; border-radius: 9999px; font-size: 0.8em; font-weight: 700; cursor: pointer; position: absolute; top: 20px; right: 20px; backdrop-filter: blur(4px); }

    /* Tiny Avatars */
    .avatar-sm { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: var(--input-bg); border: 1px solid var(--card-border);}
    .avatar-xs { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; background: var(--input-bg); }

    /* FAB (Floating Action Button) */
    .fab { position: fixed; bottom: max(20px, env(safe-area-inset-bottom)); right: 20px; width: 60px; height: 60px; border-radius: 50%; background: var(--primary); color: white; display: none; justify-content: center; align-items: center; box-shadow: 0 10px 25px rgba(59, 130, 246, 0.5); cursor: pointer; z-index: 900; transition: transform 0.2s; }
    .fab:active { transform: scale(0.9); }

    /* Inputs & Buttons */
    textarea { width: 100%; background: transparent; color: var(--text); border: none; outline: none; resize: none; font-size: 18px; font-family: inherit; margin-bottom: 10px; }
    textarea::placeholder { color: var(--text-muted); }
    .input-field { width: 100%; background: var(--input-bg); color: var(--text); border: 1px solid var(--card-border); border-radius: 12px; padding: 12px; font-size: 16px; margin-bottom: 16px; box-sizing: border-box; outline: none; }
    .input-field::placeholder { color: var(--text-muted); }
    .btn { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 9999px; cursor: pointer; font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 8px;}
    .btn-outline { background: var(--input-bg); color: var(--text); border: 1px solid var(--card-border); padding: 10px 20px; border-radius: 9999px; cursor: pointer; font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 8px;}
    .flex-between { display: flex; justify-content: space-between; align-items: center; width: 100%; }

    /* Posts in Feed */
    .post { padding: 20px; margin-bottom: 20px; cursor: pointer; transition: transform 0.1s; }
    .post:active { transform: scale(0.98); }
    .post-header { margin-bottom: 12px; display: flex; align-items: center; gap: 12px; }
    .post-author-info { display: flex; flex-direction: column; justify-content: center;}
    .author-name { font-weight: 700; font-size: 1.05em; color: var(--text);}
    .timestamp { color: var(--text-muted); font-size: 0.85em; font-weight: 500; }
    .post-content { line-height: 1.5; margin-bottom: 16px; white-space: pre-wrap; font-size: 1.05rem; }
    .post-media { width: 100%; border-radius: 12px; margin-bottom: 16px; max-height: 400px; object-fit: cover; background: var(--input-bg); border: 1px solid var(--card-border); }
    .post-stats { display: flex; gap: 20px; color: var(--text-muted); font-weight: 600; font-size: 0.95em; border-top: 1px solid var(--card-border); padding-top: 14px;}
    .c-action { cursor: pointer; user-select: none; display: flex; align-items: center; gap: 6px; }

    /* Full Post Detail Modal */
    .post-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); }
    .post-modal-card { width: 100%; height: 100%; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
    @media (min-width: 600px) { .post-modal-card { max-width: 500px; height: 90vh; border-radius: 20px; border: 1px solid var(--card-border); } }
    
    .pm-header { padding: max(15px, env(safe-area-inset-top)) 20px 15px; border-bottom: 1px solid var(--card-border); display: flex; justify-content: space-between; align-items: center; font-weight: 700; font-size: 1.1em; background: var(--card-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); z-index: 10;}
    .pm-close { cursor: pointer; color: var(--text-muted); padding: 5px; }
    .pm-body { flex: 1; overflow-y: auto; padding: 20px; background: transparent; }
    .pm-footer { padding: 15px 20px max(15px, env(safe-area-inset-bottom)); border-top: 1px solid var(--card-border); background: var(--card-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); display: flex; gap: 12px; align-items: center;}
    
    /* Comment Input */
    .comment-input { flex: 1; border: 1px solid var(--card-border); padding: 14px 18px; border-radius: 9999px; outline: none; background: var(--input-bg); color: var(--text); font-size: 15px;}
    .comment-input::placeholder { color: var(--text-muted); }
    .comment-send { background: var(--primary); color: white; border: none; border-radius: 50%; width: 46px; height: 46px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
    
    /* Comments List */
    .comment-box { padding: 16px; margin-bottom: 12px; display: flex; gap: 12px;}
    .comment-content { flex: 1; }
    .comment-author { font-weight: 700; font-size: 0.95em; margin-bottom: 4px;}
    .comment-text { font-size: 0.95em; color: var(--text); line-height: 1.4; margin-bottom: 10px;}
    .comment-actions { display: flex; gap: 16px; font-size: 0.85em; color: var(--text-muted); font-weight: 600;}

    /* General Small Modals */
    .small-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); }
    .modal-card { width: 100%; max-width: 400px; padding: 24px; position: relative;}
    .modal-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px; }
    .btn-cancel { background: var(--input-bg); color: var(--text); border: 1px solid var(--card-border); padding: 12px 24px; border-radius: 9999px; cursor: pointer; font-weight: 700; font-size: 15px;}
    .btn-danger { background: #ef4444; color: white; border: none; padding: 12px 24px; border-radius: 9999px; cursor: pointer; font-weight: 700; font-size: 15px;}

    /* Profile Edit specific */
    .profile-edit-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; display: block; margin: 0 auto 20px; border: 2px dashed var(--text-muted); background: var(--input-bg);}

    /* Admin Tools */
    .admin-tools { display: flex; gap: 12px; margin-top: 16px; border-top: 1px dashed var(--card-border); padding-top: 16px;}
    .tool-btn { background: var(--input-bg); color: var(--text); border: 1px solid var(--card-border); padding: 8px 16px; border-radius: 8px; font-size: 0.85em; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px;}
    .tool-btn.del { color: #ef4444; border-color: rgba(239, 68, 68, 0.3); background: rgba(239, 68, 68, 0.1);}
  </style>
</head>

    // Initialize Theme
    const savedTheme = localStorage.getItem('closr-theme');
    if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.body.classList.add('dark');
      updateThemeIcon(true);
    }

    themeToggleBtn.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      localStorage.setItem('closr-theme', isDark ? 'dark' : 'light');
      updateThemeIcon(isDark);
    });

    // ----- AUTHENTICATION & PROFILE FETCHING -----
    document.getElementById('google-signin-btn').addEventListener('click', () => {
      signInWithPopup(auth, new GoogleAuthProvider()).catch(err => alert("Login failed."));
    });

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-container').style.display = 'block';

        if (user.email === ADMIN_EMAIL) {
          currentUserRole = 'admin';
          document.getElementById('fab-compose').style.display = 'flex'; // Show FAB instead of inline box
          document.getElementById('user-badge').innerText = "Admin";
        } else {
          currentUserRole = 'guest';
          document.getElementById('fab-compose').style.display = 'none';
          document.getElementById('user-badge').innerText = "Family";
        }

        const userRef = doc(db, "users", user.uid);
        const docSnap = await getDoc(userRef);
        
        if (docSnap.exists()) {
          userProfile = docSnap.data();
        } else {
          userProfile = {
            name: user.displayName || user.email.split('@')[0],
            bio: "Happy to be here!",
            avatarUrl: defaultAvatar + (user.displayName || "User")
          };
          await setDoc(userRef, userProfile);
        }
        
        updateProfileUI();
        loadPosts();
      } else {
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('app-container').style.display = 'none';
        document.getElementById('fab-compose').style.display = 'none';
      }
    });

    function updateProfileUI() {
      document.getElementById('main-profile-name').innerText = userProfile.name;
      document.getElementById('main-profile-bio').innerText = userProfile.bio;
      document.getElementById('main-profile-avatar').src = userProfile.avatarUrl;
    }

    // ----- MODAL UTILS -----
    window.openComposeModal = () => { document.getElementById('compose-modal').style.display = 'flex'; };
    
    window.openProfileModal = () => {
      document.getElementById('edit-profile-name').value = userProfile.name;
      document.getElementById('edit-profile-bio').value = userProfile.bio;
      document.getElementById('edit-profile-avatar-url').value = userProfile.avatarUrl !== (defaultAvatar + userProfile.name) ? userProfile.avatarUrl : '';
      document.getElementById('profile-modal').style.display = 'flex';
    };

    window.closeSmallModals = () => { 
      document.querySelectorAll('.small-modal').forEach(m => m.style.display = 'none'); 
      currentEditId = null; currentDeleteId = null; 
    };

    // ----- PROFILE EDIT LOGIC -----
    document.getElementById('save-profile-btn').addEventListener('click', async () => {
      const btn = document.getElementById('save-profile-btn');
      btn.disabled = true; btn.innerText = "Saving...";
      
      try {
        const inputUrl = document.getElementById('edit-profile-avatar-url').value.trim();
        const newProfile = {
          name: document.getElementById('edit-profile-name').value.trim() || userProfile.name,
          bio: document.getElementById('edit-profile-bio').value.trim(),
          avatarUrl: inputUrl ? inputUrl : (defaultAvatar + (document.getElementById('edit-profile-name').value.trim() || "User"))
        };

        await setDoc(doc(db, "users", currentUser.uid), newProfile);
        userProfile = newProfile;
        updateProfileUI();
        window.closeSmallModals();
      } catch (error) {
        console.error(error); alert("Failed to update profile.");
      } finally {
        btn.disabled = false; btn.innerText = "Save";
      }
    });

    // ----- POST UI LOGIC -----
    window.toggleImageUrlInput = () => {
      const container = document.getElementById('image-url-container');
      container.style.display = container.style.display === 'none' ? 'block' : 'none';
    };

    // ----- CREATE POST -----
    document.getElementById('share-btn').addEventListener('click', async () => {
      const postInput = document.getElementById('postInput');
      const urlInput = document.getElementById('post-image-url');
      const text = postInput.value.trim();
      const mediaUrl = urlInput.value.trim();
      const shareBtn = document.getElementById('share-btn');
      
      if (!text && !mediaUrl) return;
      
      shareBtn.disabled = true; shareBtn.innerHTML = "Posting...";
      try {
        await addDoc(collection(db, "posts"), {
          text: text, 
          authorName: userProfile.name, 
          authorAvatar: userProfile.avatarUrl,
          createdAt: serverTimestamp(),
          mediaUrl: mediaUrl || null, 
          mediaType: mediaUrl ? 'image' : null, 
          likedBy: [] 
        });

        postInput.value = ''; 
        urlInput.value = '';
        document.getElementById('image-url-container').style.display = 'none';
        window.closeSmallModals();
      } catch (error) { console.error(error); alert("Couldn't post."); } 
      finally { 
        shareBtn.disabled = false; 
        shareBtn.innerHTML = `<svg class="icon-sm" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg> Share`; 
      }
    });

    // ----- LOAD MAIN FEED -----
    function loadPosts() {
      const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
      onSnapshot(q, (snapshot) => {
        const feed = document.getElementById('feed');
        feed.innerHTML = ''; 
        if (snapshot.empty) { feed.innerHTML = '<p style="text-align:center; color: var(--text-muted);">No posts yet!</p>'; return; }

        snapshot.forEach((docSnap) => {
          const data = docSnap.data();
          allPostsData[docSnap.id] = data; 
          
          let timeString = data.createdAt ? data.createdAt.toDate().toLocaleDateString() : "Just now";
          let mediaHTML = data.mediaUrl ? `<img src="${data.mediaUrl}" class="post-media" loading="lazy" alt="Post photo">` : '';
          
          const likesCount = data.likedBy ? data.likedBy.length : 0;
          const isLiked = data.likedBy && data.likedBy.includes(currentUser.uid);
          const heartIcon = isLiked ? Icons.heartFilled : Icons.heart;
          const avatarUrl = data.authorAvatar || defaultAvatar + data.authorName;

          const postHTML = `
            <div class="post glass" onclick="window.openPostModal('${docSnap.id}')">
              <div class="post-header">
                <img src="${avatarUrl}" class="avatar-sm" onerror="this.src='https://via.placeholder.com/40'">
                <div class="post-author-info">
                  <span class="author-name">${data.authorName}</span>
                  <span class="timestamp">${timeString}</span>
                </div>
              </div>
              <div class="post-content">${data.text || ''}</div>
              ${mediaHTML}
              <div class="post-stats">
                <span class="c-action">${heartIcon} ${likesCount}</span>
                <span class="c-action">${Icons.comment} Comments</span>
              </div>
            </div>
          `;
          feed.insertAdjacentHTML('beforeend', postHTML);
        });
      });
    }

    // ----- MODAL LOGIC -----
    window.openPostModal = (postId) => {
      activePostId = postId;
      const data = allPostsData[postId];
      const modalContent = document.getElementById('pm-content');
      
      let mediaHTML = data.mediaUrl ? `<img src="${data.mediaUrl}" class="post-media" loading="lazy" alt="Post photo">` : '';
      const isLiked = data.likedBy && data.likedBy.includes(currentUser.uid);
      const avatarUrl = data.authorAvatar || defaultAvatar + data.authorName;
      const heartIcon = isLiked ? Icons.heartFilled : Icons.heart;
      
      let adminTools = '';
      if (currentUserRole === 'admin') {
        const safeText = data.text ? data.text.replace(/'/g, "\\'").replace(/"/g, '&quot;') : '';
        adminTools = `
          <div class="admin-tools">
            <button class="tool-btn" onclick="window.openEdit('${postId}', '${safeText}')">${Icons.edit} Edit</button>
            <button class="tool-btn del" onclick="window.openDelete('${postId}')">${Icons.trash} Delete</button>
          </div>
        `;
      }

      modalContent.innerHTML = `
        <div class="post glass" style="box-shadow: none; margin-bottom: 20px; cursor: default;">
          <div class="post-header">
            <img src="${avatarUrl}" class="avatar-sm" onerror="this.src='https://via.placeholder.com/40'">
            <div class="post-author-info">
              <span class="author-name">${data.authorName}</span>
            </div>
          </div>
          <div class="post-content">${data.text || ''}</div>
          ${mediaHTML}
          <div style="margin-top: 10px;">
            <span class="c-action" style="font-weight: 700; color: var(--text-muted);" onclick="window.togglePostLike('${postId}')">
               ${heartIcon} ${data.likedBy ? data.likedBy.length : 0} Likes
            </span>
          </div>
          ${adminTools}
        </div>
      `;

      document.getElementById('post-detail-modal').style.display = 'flex';
      
      const q = query(collection(db, "posts", postId, "comments"), orderBy("createdAt", "asc"));
      commentsUnsubscribe = onSnapshot(q, (snapshot) => {
        const commentsDiv = document.getElementById('pm-comments');
        commentsDiv.innerHTML = '';
        if(snapshot.empty) { commentsDiv.innerHTML = '<p style="color:var(--text-muted); font-size:14px; text-align: center;">No comments yet.</p>'; return; }
        
        snapshot.forEach(docSnap => {
          const cData = docSnap.data();
          const cId = docSnap.id;
          const cIsLiked = cData.likedBy && cData.likedBy.includes(currentUser.uid);
          const cHeart = cIsLiked ? Icons.heartFilled : Icons.heart;
          const cAvatar = cData.authorAvatar || defaultAvatar + cData.authorName;
          const safeName = cData.authorName.replace(/'/g, "\\'");

          commentsDiv.insertAdjacentHTML('beforeend', `
            <div class="comment-box glass" style="padding: 12px;">
              <img src="${cAvatar}" class="avatar-xs" onerror="this.src='https://via.placeholder.com/32'">
              <div class="comment-content">
                <div class="comment-author">${cData.authorName}</div>
                <div class="comment-text">${cData.text}</div>
                <div class="comment-actions">
                  <span class="c-action" onclick="window.toggleCommentLike('${postId}', '${cId}', ${cIsLiked})">${cHeart} ${cData.likedBy ? cData.likedBy.length : 0}</span>
                  <span class="c-action" onclick="window.replyTo('${safeName}')">Reply</span>
                </div>
              </div>
            </div>
          `);
        });
        const modalBody = document.querySelector('.pm-body');
        modalBody.scrollTop = modalBody.scrollHeight;
      });
    };

    window.closePostModal = () => { document.getElementById('post-detail-modal').style.display = 'none'; if (commentsUnsubscribe) commentsUnsubscribe(); activePostId = null; };
    
    // Global Click-Outside Logic
    window.onclick = function(e) {
      if (e.target.classList.contains('post-modal-overlay')) window.closePostModal();
      if (e.target.classList.contains('small-modal')) window.closeSmallModals();
    };

    window.togglePostLike = async (postId) => {
      const isLiked = allPostsData[postId].likedBy && allPostsData[postId].likedBy.includes(currentUser.uid);
      const postRef = doc(db, "posts", postId);
      if (isLiked) await updateDoc(postRef, { likedBy: arrayRemove(currentUser.uid) });
      else await updateDoc(postRef, { likedBy: arrayUnion(currentUser.uid) });
      window.openPostModal(postId); 
    };

    window.toggleCommentLike = async (postId, commentId, isCurrentlyLiked) => {
      const commentRef = doc(db, "posts", postId, "comments", commentId);
      if (isCurrentlyLiked) await updateDoc(commentRef, { likedBy: arrayRemove(currentUser.uid) });
      else await updateDoc(commentRef, { likedBy: arrayUnion(currentUser.uid) });
    };

    window.submitComment = async () => {
      if(!activePostId) return;
      const input = document.getElementById('comment-input');
      const text = input.value.trim();
      if(!text) return;
      
      input.value = ''; 
      await addDoc(collection(db, "posts", activePostId, "comments"), {
        text: text,
        authorName: userProfile.name,
        authorAvatar: userProfile.avatarUrl,
        createdAt: serverTimestamp(),
        likedBy: []
      });
    };

    window.replyTo = (name) => {
      const input = document.getElementById('comment-input');
      input.value = `@${name} ` + input.value;
      input.focus();
    };

    let currentEditId = null; let currentDeleteId = null;
    window.openEdit = (id, text) => { currentEditId = id; document.getElementById('edit-textarea').value = text; document.getElementById('edit-modal').style.display = 'flex'; };
    window.openDelete = (id) => { currentDeleteId = id; document.getElementById('delete-modal').style.display = 'flex'; };

    document.getElementById('save-edit-btn').addEventListener('click', async () => {
      if (!currentEditId) return;
      await updateDoc(doc(db, "posts", currentEditId), { text: document.getElementById('edit-textarea').value.trim() });
      window.closeSmallModals(); window.openPostModal(currentEditId); 
    });

    document.getElementById('confirm-delete-btn').addEventListener('click', async () => {
      if (!currentDeleteId) return;
      await deleteDoc(doc(db, "posts", currentDeleteId));
      window.closeSmallModals(); window.closePostModal(); 
    });

  </script>
</body>
</html>
