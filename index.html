<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>CLOSR</title>
  <style>
    /* Design Preference: Minimalist, soft shadows, no hard borders */
    :root {
      --bg: #f2f2f7;
      --text: #1c1c1e;
      --text-muted: #8e8e93;
      --primary: #007aff;
      --card-bg: rgba(255, 255, 255, 0.85);
      --glass-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      --input-bg: rgba(239, 239, 240, 0.8);
      --blob-1: rgba(0, 122, 255, 0.1);
      --blob-2: rgba(175, 82, 222, 0.1);
    }

    body.dark {
      --bg: #000000;
      --text: #ffffff;
      --text-muted: #98989d;
      --primary: #0a84ff;
      --card-bg: rgba(28, 28, 30, 0.85);
      --glass-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      --input-bg: rgba(44, 44, 46, 0.8);
    }

    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      background-color: var(--bg); 
      background-image: radial-gradient(at 0% 0%, var(--blob-1) 0px, transparent 50%), radial-gradient(at 100% 100%, var(--blob-2) 0px, transparent 50%);
      background-attachment: fixed;
      color: var(--text); 
      margin: 0; padding: 0; min-height: 100vh;
      transition: background-color 0.4s;
      -webkit-tap-highlight-color: transparent;
    }
    
    .container { max-width: 600px; margin: 0 auto; padding: 20px; padding-top: calc(20px + env(safe-area-inset-top)); padding-bottom: calc(90px + env(safe-area-inset-bottom)); display: none; }
    
    .glass {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: var(--glass-shadow);
      border-radius: 22px;
      border: none;
    }

    .icon-sm { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    
    /* Nav */
    .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding: 0 4px; }
    .nav-title { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
    .icon-btn { background: var(--input-bg); border: none; color: var(--text); width: 38px; height: 38px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; }
    .icon-btn:active { transform: scale(0.9); }

    /* Profile Card */
    .profile-header { padding: 18px; margin-bottom: 24px; display: flex; align-items: center; gap: 16px; cursor: pointer; }
    .profile-avatar { width: 58px; height: 58px; border-radius: 50%; object-fit: cover; background: var(--input-bg); }
    .profile-info { flex: 1; }
    .profile-name { font-weight: 700; font-size: 1.1em; }
    .profile-bio { color: var(--text-muted); font-size: 0.9em; }

    /* Posts */
    .post { padding: 20px; margin-bottom: 16px; transition: transform 0.2s; }
    .post:active { transform: scale(0.98); }
    .post-header { margin-bottom: 12px; display: flex; align-items: center; gap: 12px; }
    .author-name { font-weight: 600; font-size: 15px; }
    .timestamp { color: var(--text-muted); font-size: 13px; }
    .post-content { line-height: 1.45; margin-bottom: 14px; font-size: 16px; }
    .post-media { width: 100%; border-radius: 14px; margin-bottom: 14px; border: none; background: #000; }
    .post-stats { display: flex; gap: 20px; color: var(--text-muted); font-weight: 600; font-size: 14px; padding-top: 12px; border-top: 1px solid rgba(142,142,147, 0.1); }
    .c-action { cursor: pointer; display: flex; align-items: center; gap: 6px; }

    /* Modals */
    .post-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
    .post-modal-card { width: 100%; height: 100%; display: flex; flex-direction: column; background: var(--bg); }
    @media (min-width: 600px) { .post-modal-card { max-width: 500px; height: 85vh; border-radius: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); } }
    
    .pm-header { padding: max(16px, env(safe-area-inset-top)) 20px 16px; border-bottom: 1px solid rgba(142,142,147, 0.1); display: flex; justify-content: space-between; align-items: center; font-weight: 700; background: var(--card-bg); backdrop-filter: blur(20px); }
    .pm-body { flex: 1; overflow-y: auto; padding: 20px; }
    .pm-footer { padding: 16px 20px max(16px, env(safe-area-inset-bottom)); background: var(--card-bg); display: flex; gap: 12px; align-items: center; border-top: 1px solid rgba(142,142,147, 0.1); }
    
    .comment-input { flex: 1; border: none; padding: 12px 18px; border-radius: 20px; background: var(--input-bg); color: var(--text); font-size: 15px; outline: none; }
    .comment-send { background: var(--primary); color: white; border: none; border-radius: 50%; width: 40px; height: 40px; font-weight: bold; cursor: pointer; }

    /* Comments List */
    .comment-box { padding: 14px; margin-bottom: 10px; display: flex; gap: 12px; position: relative;}
    .comment-content { flex: 1; }
    .comment-author { font-weight: 700; font-size: 14px; margin-bottom: 2px;}
    .comment-text { font-size: 14px; line-height: 1.4; }
    .comment-delete { color: #ff3b30; font-size: 12px; font-weight: 600; cursor: pointer; padding: 4px; }

    /* FAB */
    .fab { position: fixed; bottom: calc(20px + env(safe-area-inset-bottom)); right: 20px; width: 60px; height: 60px; border-radius: 50%; background: var(--primary); color: white; display: none; justify-content: center; align-items: center; box-shadow: 0 10px 25px rgba(0, 122, 255, 0.3); z-index: 900; }

    .btn { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 14px; cursor: pointer; font-weight: 600; font-size: 15px; }
    .input-field { width: 100%; background: var(--input-bg); color: var(--text); border: none; border-radius: 12px; padding: 14px; font-size: 16px; margin-bottom: 16px; box-sizing: border-box; outline: none; }
    .small-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 2000; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(10px); }
  </style>
</head>
<body>

  <!-- Login -->
  <div id="login-screen" style="position:fixed; inset:0; background:var(--bg); display:flex; justify-content:center; align-items:center; z-index:3000;">
    <div class="glass" style="padding: 40px; text-align: center; width: 280px;">
      <h2 style="margin:0 0 10px 0; font-size: 32px; letter-spacing: -1px;">CLOSR</h2>
      <p style="color:var(--text-muted); margin-bottom: 30px;">Family only.</p>
      <button class="btn" id="google-signin-btn" style="width:100%">Sign in with Google</button>
    </div>
  </div>

  <!-- App -->
  <div class="container" id="app-container">
    <div class="nav-header">
      <h1 class="nav-title">CLOSR <span id="user-badge" style="font-size: 11px; text-transform: uppercase; vertical-align: middle; opacity: 0.5;"></span></h1>
      <button id="theme-toggle" class="icon-btn">🌓</button>
    </div>
    
    <div class="profile-header glass" onclick="openProfileModal()">
      <img id="main-profile-avatar" class="profile-avatar" src="https://via.placeholder.com/60">
      <div class="profile-info">
        <div class="profile-name" id="main-profile-name">...</div>
        <div class="profile-bio" id="main-profile-bio">...</div>
      </div>
    </div>

    <div id="feed"></div>
  </div>

  <div id="fab-compose" class="fab" onclick="openComposeModal()">
    <svg class="icon-sm" viewBox="0 0 24 24" style="stroke-width: 3;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
  </div>

  <!-- Unified Compose Modal -->
  <div id="compose-modal" class="small-modal">
    <div class="modal-card glass" style="width: 100%; max-width: 400px; padding: 24px;">
      <textarea id="postInput" rows="3" placeholder="What's happening?" style="width:100%; background:transparent; border:none; color:var(--text); font-size: 18px; outline:none; resize:none;"></textarea>
      <div id="media-input-wrap" style="display:none; margin-top: 10px;">
        <input type="text" id="unified-link" class="input-field" placeholder="Paste Image or YouTube link..." style="margin-bottom:0;">
      </div>
      <div style="display:flex; gap:12px; margin-top: 20px;">
        <button class="icon-btn" onclick="toggleMediaInput()">🔗</button>
        <button class="btn" id="share-btn" style="flex:1;">Post</button>
        <button class="icon-btn" onclick="closeSmallModals()" style="background:transparent;">✕</button>
      </div>
    </div>
  </div>

  <!-- Detail Modal -->
  <div id="post-detail-modal" class="post-modal-overlay">
    <div class="post-modal-card">
      <div class="pm-header">
        <span>Post</span>
        <span onclick="closePostModal()" style="cursor:pointer; opacity:0.5;">✕</span>
      </div>
      <div class="pm-body">
        <div id="pm-content"></div>
        <div id="pm-comments" style="margin-top: 20px;"></div>
      </div>
      <div class="pm-footer">
        <input type="text" id="comment-input" class="comment-input" placeholder="Your reply...">
        <button class="comment-send" onclick="submitComment()">↑</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, deleteDoc, updateDoc, arrayUnion, arrayRemove, setDoc, getDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDusGOyWlAEpBUZ-Bm89vZ9SAqAMrWJt3E",
      authDomain: "anda-sol.firebaseapp.com",
      projectId: "anda-sol",
      storageBucket: "anda-sol.firebasestorage.app",
      messagingSenderId: "341991663482",
      appId: "1:341991663482:web:fe92b24241c2fe7a9b98c3"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const ADMIN_EMAIL = "amorsolo.villanda@gmail.com";

    let currentUser = null;
    let userProfile = {};
    let activePostId = null;
    let commentUnsub = null;

    // --- THEME ---
    const themeBtn = document.getElementById('theme-toggle');
    themeBtn.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      localStorage.setItem('closr-theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    });
    if(localStorage.getItem('closr-theme') === 'dark') document.body.classList.add('dark');

    // --- AUTH ---
    document.getElementById('google-signin-btn').addEventListener('click', () => signInWithPopup(auth, new GoogleAuthProvider()));

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-container').style.display = 'block';
        document.getElementById('fab-compose').style.display = (user.email === ADMIN_EMAIL) ? 'flex' : 'none';
        document.getElementById('user-badge').innerText = (user.email === ADMIN_EMAIL) ? 'Admin' : 'Family';
        
        const snap = await getDoc(doc(db, "users", user.uid));
        userProfile = snap.exists() ? snap.data() : { name: user.displayName, bio: "Family member", avatarUrl: user.photoURL };
        updateUI();
        loadPosts();
      } else {
        document.getElementById('login-screen').style.display = 'flex';
      }
    });

    function updateUI() {
      document.getElementById('main-profile-name').innerText = userProfile.name;
      document.getElementById('main-profile-bio').innerText = userProfile.bio;
      document.getElementById('main-profile-avatar').src = userProfile.avatarUrl;
    }

    // --- MODALS ---
    window.openComposeModal = () => document.getElementById('compose-modal').style.display = 'flex';
    window.closeSmallModals = () => document.querySelectorAll('.small-modal').forEach(m => m.style.display='none');
    window.toggleMediaInput = () => {
      const el = document.getElementById('media-input-wrap');
      el.style.display = (el.style.display === 'none') ? 'block' : 'none';
    };

    // --- POSTING ---
    document.getElementById('share-btn').addEventListener('click', async () => {
      const txt = document.getElementById('postInput').value.trim();
      const link = document.getElementById('unified-link').value.trim();
      if(!txt && !link) return;

      let type = 'image';
      let finalLink = link;
      const ytMatch = link.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))([^&]{11})/);
      if(ytMatch) { type = 'youtube'; finalLink = ytMatch[1]; }

      await addDoc(collection(db, "posts"), {
        text: txt,
        mediaUrl: finalLink || null,
        mediaType: finalLink ? type : null,
        authorName: userProfile.name,
        authorAvatar: userProfile.avatarUrl,
        authorId: currentUser.uid,
        createdAt: serverTimestamp(),
        likedBy: []
      });
      
      document.getElementById('postInput').value = '';
      document.getElementById('unified-link').value = '';
      closeSmallModals();
    });

    // --- FEED ---
    function loadPosts() {
      onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc")), (snap) => {
        const feed = document.getElementById('feed');
        feed.innerHTML = '';
        snap.forEach(async (d) => {
          const post = d.data();
          const pId = d.id;
          
          // Count comments (Sub-collection fetch for this demo)
          const cSnap = await getDocs(collection(db, "posts", pId, "comments"));
          const cCount = cSnap.size;

          let media = '';
          if(post.mediaUrl) {
            if(post.mediaType === 'youtube') media = `<iframe class="post-media" src="https://www.youtube.com/embed/${post.mediaUrl}" style="aspect-ratio:16/9;"></iframe>`;
            else media = `<img src="${post.mediaUrl}" class="post-media">`;
          }

          feed.insertAdjacentHTML('beforeend', `
            <div class="post glass" onclick="window.openPostModal('${pId}')">
              <div class="post-header">
                <img src="${post.authorAvatar}" class="avatar-sm" style="width:40px; height:40px; border-radius:50%;">
                <div class="post-author-info">
                  <div class="author-name">${post.authorName}</div>
                  <div class="timestamp">Just now</div>
                </div>
              </div>
              <div class="post-content">${post.text || ''}</div>
              ${media}
              <div class="post-stats">
                <span>❤️ ${post.likedBy?.length || 0}</span>
                <span>💬 ${cCount} Comments</span>
              </div>
            </div>
          `);
        });
      });
    }

    // --- POST DETAIL ---
    window.openPostModal = async (id) => {
      activePostId = id;
      const d = await getDoc(doc(db, "posts", id));
      const post = d.data();
      const cont = document.getElementById('pm-content');
      
      let media = '';
      if(post.mediaUrl) {
        if(post.mediaType === 'youtube') media = `<iframe class="post-media" src="https://www.youtube.com/embed/${post.mediaUrl}" style="aspect-ratio:16/9;"></iframe>`;
        else media = `<img src="${post.mediaUrl}" class="post-media">`;
      }

      cont.innerHTML = `
        <div class="post-header">
           <img src="${post.authorAvatar}" style="width:44px; height:44px; border-radius:50%;">
           <div class="author-name">${post.authorName}</div>
        </div>
        <div class="post-content">${post.text || ''}</div>
        ${media}
      `;

      document.getElementById('post-detail-modal').style.display = 'flex';
      
      if(commentUnsub) commentUnsub();
      commentUnsub = onSnapshot(query(collection(db, "posts", id, "comments"), orderBy("createdAt", "asc")), (snap) => {
        const div = document.getElementById('pm-comments');
        div.innerHTML = '';
        snap.forEach(cd => {
          const c = cd.data();
          const isOwn = c.authorId === currentUser.uid || currentUser.email === ADMIN_EMAIL;
          div.insertAdjacentHTML('beforeend', `
            <div class="comment-box glass">
              <div class="comment-content">
                <div class="comment-author">${c.authorName}</div>
                <div class="comment-text">${c.text}</div>
              </div>
              ${isOwn ? `<span class="comment-delete" onclick="deleteComment('${cd.id}')">Delete</span>` : ''}
            </div>
          `);
        });
      });
    };

    window.closePostModal = () => {
      document.getElementById('post-detail-modal').style.display = 'none';
      if(commentUnsub) commentUnsub();
      activePostId = null;
    };

    // --- COMMENT LOGIC ---
    window.submitComment = async () => {
      const inp = document.getElementById('comment-input');
      const val = inp.value.trim();
      if(!val || !activePostId) return;
      
      await addDoc(collection(db, "posts", activePostId, "comments"), {
        text: val,
        authorName: userProfile.name,
        authorId: currentUser.uid,
        createdAt: serverTimestamp()
      });
      inp.value = '';
    };

    window.deleteComment = async (cId) => {
      if(!confirm("Delete this comment?")) return;
      await deleteDoc(doc(db, "posts", activePostId, "comments", cId));
    };

  </script>
</body>
</html>
